# ─────────────────────────────────────────────────────────────────────────────
#  RAPID — Production Docker Compose
#
#  Quick start:
#    export JWT_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#    docker-compose up -d
#
#  Services:
#    nginx   — serves the frontend (port 80) and proxies /api/* → rapid:8000
#    rapid   — FastAPI backend (internal port 8000, not exposed externally)
#    ollama  — local LLM inference (optional, port 11434)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── nginx: frontend + reverse proxy ───────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      rapid:
        condition: service_healthy
    networks:
      - rapid-network
    restart: unless-stopped

  # ── rapid: FastAPI backend ─────────────────────────────────────────────────
  rapid:
    build: .
    # Not exposed directly — all traffic routed through nginx
    expose:
      - "8000"
    environment:
      RAPID_ENV: production
      # JWT_SECRET_KEY has no default — set it before running:
      #   export JWT_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set — see README.md}
      RAPID_ENCRYPTION_KEY: ${RAPID_ENCRYPTION_KEY:?RAPID_ENCRYPTION_KEY must be set — see .env.example}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/db/rapid.db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-data/audit.log}
      RAPID_JOB_DB_PATH: data/db/jobs.db
      RAPID_ENABLE_JOB_WORKER: "false"
      RAPID_REQUIRE_JOB_WORKER: "true"
      RAPID_ENABLE_SCHEDULER: ${RAPID_ENABLE_SCHEDULER:-true}
      USE_QDRANT: ${USE_QDRANT:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - rapid-data:/app/data
      - rapid-logs:/app/logs
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rapid-network
    restart: unless-stopped

  # Durable background jobs: RAG indexing, connector syncs, and webhooks.
  worker:
    build: .
    command: ["python", "-m", "workers.job_worker"]
    environment:
      RAPID_ENV: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set — see README.md}
      RAPID_ENCRYPTION_KEY: ${RAPID_ENCRYPTION_KEY:?RAPID_ENCRYPTION_KEY must be set — see .env.example}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      RAPID_JOB_DB_PATH: data/db/jobs.db
      USE_QDRANT: ${USE_QDRANT:-false}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - rapid-data:/app/data
      - rapid-logs:/app/logs
    depends_on:
      rapid:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - rapid-network
    restart: unless-stopped

  # ── ollama: local LLM inference (optional) ────────────────────────────────
  # To pull a model after first start:
  #   docker exec rapid-ollama-1 ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rapid-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    profiles: ["qdrant"]
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rapid-network
    restart: unless-stopped

networks:
  rapid-network:
    driver: bridge

volumes:
  rapid-data:
  rapid-logs:
  ollama-data:
  qdrant-data:
