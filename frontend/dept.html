<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Department — RAPID</title>
<link rel="stylesheet" href="rapid-design.css?v=2"/>
<script src="config.js"></script>
<script src="dept-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);background-image:var(--bg-pattern);background-size:var(--bg-pattern-size);font-family:system-ui,-apple-system,sans-serif}

/* Reveal */
.rev{opacity:1;transform:translateY(0);transition:opacity 360ms cubic-bezier(0.23,1,0.32,1),transform 360ms cubic-bezier(0.23,1,0.32,1)}
@starting-style{.rev{opacity:0;transform:translateY(10px)}}

/* ── Top nav ── */
.tnav{flex-shrink:0;display:flex;align-items:center;gap:0;height:52px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tnav-logo{width:28px;height:28px;border-radius:6px;background:var(--dept-accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;transition:background var(--t-fast)}
.tnav-brandname{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text);margin:0 6px 0 10px}
.tnav-brandsub{font-size:10px;color:var(--text-muted);font-weight:400}
.tnav-vsep{width:1px;height:18px;background:var(--border-strong);margin:0 16px;flex-shrink:0}
.tnav-deptbadge{display:flex;align-items:center;gap:7px}
.tnav-deptdot{width:6px;height:6px;border-radius:50%;background:var(--dept-accent);animation:lp 2s ease-in-out infinite;flex-shrink:0}
.tnav-deptname{font-size:13px;font-weight:600;color:var(--dept-accent)}
.tnav-links{display:flex;align-items:center;gap:2px;margin:0 auto}
.tnav-link{padding:6px 13px;border-radius:var(--r-sm);font-size:13px;color:var(--text-dim);text-decoration:none;transition:color var(--t-fast),background var(--t-fast)}
.tnav-link:hover{color:var(--text);background:var(--surface-raised)}
.tnav-link.cur{color:var(--text);background:var(--surface-raised)}
.tnav-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tnav-av{width:28px;height:28px;border-radius:50%;background:var(--dept-accent-dim);border:1.5px solid var(--dept-accent-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dept-accent);flex-shrink:0}
.tnav-nm{font-size:12px;font-weight:600;color:var(--text)}
.tnav-out{font-size:11px;color:var(--text-muted);background:none;border:1px solid var(--border);cursor:pointer;padding:5px 10px;border-radius:var(--r-sm);transition:color var(--t-fast),border-color var(--t-fast),transform 160ms cubic-bezier(0.23,1,0.32,1)}
.tnav-out:hover{color:var(--text);border-color:var(--border-strong)}
.tnav-out:active{transform:scale(0.97)}

/* Main scrollable */
.main-scroll{flex:1;overflow-y:auto;scroll-behavior:smooth}

/* ── User strip ── */
.ustrip{display:flex;align-items:center;gap:14px;padding:11px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.ustrip-av{width:32px;height:32px;border-radius:50%;background:var(--dept-accent-dim);border:1.5px solid var(--dept-accent-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--dept-accent);flex-shrink:0}
.ustrip-name{font-size:13px;font-weight:600;color:var(--text)}
.ustrip-meta{font-size:11px;color:var(--text-muted);margin-top:1px}
.ustrip-pills{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-left:auto}
.ustrip-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-full);background:var(--dept-accent-dim);color:var(--dept-accent);border:1px solid var(--dept-accent-border)}
.ustrip-pill.mut{background:var(--surface-raised);color:var(--text-muted);border-color:var(--border)}
.ustrip-platform{font-size:11px;color:var(--text-muted);padding:4px 11px;border:1px solid var(--border);border-radius:var(--r-full);background:var(--surface-raised);display:flex;align-items:center;gap:5px;flex-shrink:0}
.ustrip-pdot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}

/* ── Dept hero ── */
.dhero{display:grid;grid-template-columns:1fr 270px;gap:32px;padding:28px 28px 24px;border-bottom:1px solid var(--border);align-items:start}
@media(max-width:900px){.dhero{grid-template-columns:1fr}}
.dhero-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dhero-live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dept-accent)}
.dhero-ldot{width:6px;height:6px;border-radius:50%;background:var(--dept-accent);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.dhero-divbadge{font-size:10px;color:var(--text-muted);padding:2px 9px;border:1px solid var(--border);border-radius:var(--r-full)}
.dhero-h1{font-size:30px;font-weight:800;letter-spacing:-.04em;color:var(--text);line-height:1.1;margin-bottom:10px}
.dhero-desc{font-size:13px;color:var(--text-dim);line-height:1.75;max-width:560px;margin-bottom:18px}
.dhero-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dhero-mi{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.dhero-mi strong{color:var(--dept-accent);font-weight:700;font-size:12px}
.dhero-sep{color:var(--border-strong)}

/* Hierarchy tree */
.htree{display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 12px}
.htree-node{padding:6px 14px;border-radius:var(--r-md);font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface-raised);color:var(--text-dim);text-align:center;white-space:nowrap;width:100%;box-sizing:border-box}
.htree-node.curr{background:var(--dept-accent-dim);border-color:var(--dept-accent-border);color:var(--dept-accent);font-size:12px;box-shadow:0 0 0 3px var(--dept-accent-border)}
.htree-vline{width:1px;height:16px;background:var(--border-strong);margin:0 auto}
.htree-hrow{display:flex;gap:5px;position:relative;width:100%;padding-top:16px}
.htree-hrow::before{content:'';position:absolute;top:0;left:6px;right:6px;height:1px;background:var(--border-strong)}
.htree-child{flex:1;padding:4px 5px;border-radius:var(--r-sm);font-size:9px;font-weight:500;border:1px solid var(--border);background:var(--surface-elevated);color:var(--text-muted);text-align:center;position:relative}
.htree-child::before{content:'';position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:1px;height:16px;background:var(--border-strong)}
.htree-esc{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);font-size:10px;color:var(--text-muted);text-align:center;width:100%}
.htree-esc strong{color:var(--dept-accent)}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--border);gap:1px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
@media(max-width:680px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-cell{padding:18px 24px;background:var(--bg);transition:background var(--t-fast)}
.stat-cell:hover{background:var(--surface)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-.035em;color:var(--text);line-height:1}
.stat-chg{font-size:11px;margin-top:5px}
.stat-chg.up{color:#22c55e}.stat-chg.dn{color:#ef4444}.stat-chg.neu{color:var(--text-muted)}

/* ── Viz ── */
.viz-wrap{display:grid;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.viz-wrap.l3{grid-template-columns:2fr 1fr 1fr}
.viz-wrap.l2{grid-template-columns:3fr 2fr}
@media(max-width:900px){.viz-wrap.l3,.viz-wrap.l2{grid-template-columns:1fr}}
.viz-cell{padding:20px 24px;background:var(--bg)}
.viz-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:14px;font-weight:600}
.viz-canvas{width:100%;display:block}

/* ── Skills ── */
.skills-wrap{padding:24px 28px;border-bottom:1px solid var(--border)}
.sec-h{font-size:15px;font-weight:700;letter-spacing:-.015em;color:var(--text);margin-bottom:3px}
.sec-sub{font-size:12px;color:var(--text-muted);margin-bottom:18px}
.skills-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:900px){.skills-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.skills-grid{grid-template-columns:1fr}}
.skill-cat-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dept-accent);margin-bottom:10px}
.skill-tags{display:flex;flex-wrap:wrap;gap:5px}
.stag{font-size:11px;padding:4px 10px;border-radius:var(--r-full);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:border-color 160ms,color 160ms,background 160ms;cursor:default}
.stag:hover{border-color:var(--dept-accent-border);color:var(--text);background:var(--dept-accent-dim)}

/* ── Tools ── */
.tools-wrap{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.tools-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tool-card{display:flex;align-items:center;gap:9px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg);transition:border-color 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.tool-card:hover{border-color:var(--dept-accent-border);transform:translateY(-1px)}
.tool-abbr{width:28px;height:28px;border-radius:var(--r-sm);background:var(--dept-accent-dim);border:1px solid var(--dept-accent-border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--dept-accent);flex-shrink:0;letter-spacing:.02em}
.tool-name{font-size:12px;font-weight:600;color:var(--text)}
.tool-cat{font-size:10px;color:var(--text-muted)}
.tool-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:4px}

/* ── Workflows ── */
.wf-wrap{padding:24px 28px;border-bottom:1px solid var(--border)}
.wf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:760px){.wf-grid{grid-template-columns:1fr}}
.wf-card{padding:16px 18px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);text-align:left;cursor:pointer;transition:border-color 160ms,background 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1);display:flex;flex-direction:column;gap:6px;width:100%}
.wf-card:hover{border-color:var(--dept-accent-border);background:var(--surface-raised)}
.wf-card:active{transform:scale(0.97)}
.wf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.wf-name{font-size:13px;font-weight:700;color:var(--text)}
.wf-time{font-size:10px;color:var(--dept-accent);padding:2px 8px;background:var(--dept-accent-dim);border:1px solid var(--dept-accent-border);border-radius:var(--r-full);flex-shrink:0}
.wf-desc{font-size:11px;color:var(--text-dim);line-height:1.55}
.wf-run{font-size:11px;font-weight:600;color:var(--dept-accent);display:flex;align-items:center;gap:4px;margin-top:2px}

/* ── Prompts ── */
.prompts-wrap{padding:24px 28px;border-bottom:1px solid var(--border)}
.prompt-feat{display:flex;align-items:center;gap:12px;padding:14px 18px;margin-bottom:12px;background:var(--dept-accent-dim);border:1px solid var(--dept-accent-border);border-radius:var(--r-lg);cursor:pointer;transition:border-color 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.prompt-feat:hover{border-color:var(--dept-accent)}
.prompt-feat:active{transform:scale(0.97)}
.pf-ico{width:32px;height:32px;border-radius:var(--r-md);background:var(--dept-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.pf-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--dept-accent);font-weight:700;margin-bottom:2px}
.pf-q{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.pf-arr{color:var(--dept-accent);flex-shrink:0;margin-left:auto}
.prompts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:680px){.prompts-grid{grid-template-columns:1fr}}
.pchip{padding:10px 13px;border:1px solid var(--border);border-radius:var(--r-md);font-size:12px;color:var(--text-dim);background:var(--surface);cursor:pointer;transition:border-color 160ms,color 160ms,background 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1);line-height:1.5;text-align:left;display:flex;align-items:flex-start;gap:7px;width:100%}
.pchip:hover{border-color:var(--dept-accent-border);color:var(--text);background:var(--surface-raised)}
.pchip:active{transform:scale(0.97)}
.pchip-n{font-size:10px;font-weight:700;color:var(--dept-accent);flex-shrink:0;margin-top:1px;opacity:.65}

/* ── Roster ── */
.roster-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
@media(max-width:760px){.roster-wrap{grid-template-columns:1fr}}
.roster-cell{background:var(--bg);padding:20px 24px}
.roster-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:14px;font-weight:600}
.agent-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.agent-row:last-child{border-bottom:none;padding-bottom:0}
.agent-dot{width:8px;height:8px;border-radius:50%;background:var(--dept-accent);flex-shrink:0;margin-top:4px;box-shadow:0 0 0 3px var(--dept-accent-dim)}
.agent-name{font-size:13px;font-weight:600;color:var(--text)}
.agent-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.data-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.data-row:last-child{border-bottom:none;padding-bottom:0}
.data-ico{width:26px;height:26px;border-radius:var(--r-sm);background:var(--surface-raised);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted)}
.data-name{font-size:11px;font-weight:600;color:var(--text);font-family:'Courier New',monospace}
.data-desc{font-size:10px;color:var(--text-muted)}
.access-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-full);flex-shrink:0;margin-left:auto;white-space:nowrap}
.access-full{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.access-read{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2)}
.access-dept{background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2)}
.access-none{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}

/* ── Peers ── */
.peers-wrap{padding:20px 28px;border-bottom:1px solid var(--border)}
.peers-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}
.peer-src{padding:10px 16px;background:var(--dept-accent-dim);border:1px solid var(--dept-accent-border);border-radius:var(--r-md);font-size:12px;font-weight:700;color:var(--dept-accent)}
.peer-arr{color:var(--border-strong);font-size:18px;line-height:1}
.peer-card{padding:9px 13px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);text-decoration:none;transition:border-color 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.peer-card:hover{border-color:var(--dept-accent-border)}
.peer-card:active{transform:scale(0.97)}
.peer-name{font-size:12px;font-weight:600;color:var(--text)}
.peer-reason{font-size:10px;color:var(--text-muted)}

/* ── Action bar ── */
.action-bar{display:flex;align-items:center;gap:8px;padding:13px 28px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.btn-ask{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-md);background:var(--dept-accent);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.btn-ask:hover{opacity:.88}
.btn-ask:active{transform:scale(0.97)}
.btn-act{display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r-md);background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:border-color 160ms,color 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.btn-act:hover{border-color:var(--dept-accent-border);color:var(--text)}
.btn-act:active{transform:scale(0.97)}
.btn-esc{margin-left:auto;display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r-md);background:transparent;color:var(--text-muted);font-size:12px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:border-color 160ms,color 160ms,transform 160ms cubic-bezier(0.23,1,0.32,1)}
.btn-esc:hover{border-color:var(--border-strong);color:var(--text)}
.btn-esc:active{transform:scale(0.97)}

/* Brief */
.brief-bar{display:flex;align-items:center;gap:14px;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.brief-icon{width:30px;height:30px;border-radius:var(--r-md);background:var(--dept-accent-dim);border:1px solid var(--dept-accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--dept-accent)}
.brief-text{flex:1;font-size:12px;color:var(--text-dim);line-height:1.55}
.brief-text strong{color:var(--text)}
.brief-dismiss{font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r-sm);flex-shrink:0;transition:color var(--t-fast)}
.brief-dismiss:hover{color:var(--text)}
.doc-tag{display:inline-block;margin:3px 3px 0 0;font-size:10px;padding:3px 9px;border:1px solid var(--border);border-radius:var(--r-full);color:var(--text-muted);background:var(--surface-raised)}
</style>
</head>

function applyAccent(d){
  const r=document.documentElement;
  r.style.setProperty('--dept-accent',d.accent);
  r.style.setProperty('--dept-accent-dim',d.accent_dim);
  r.style.setProperty('--dept-accent-border',d.accent_border);
  r.style.setProperty('--dept-accent-shadow',d.accent_shadow);
  const logo=document.getElementById('tnav-logo');
  if(logo)logo.style.background=d.accent;
}

function hexToRgba(hex,a){
  const n=parseInt(hex.replace('#',''),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

/* ── Charts ── */
function setupCanvas(el){
  const dpr=window.devicePixelRatio||1;
  const w=el.offsetWidth||el.parentElement?.offsetWidth||300;
  const h=el.height||140;
  el.width=w*dpr;el.height=h*dpr;
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
  return{ctx,w,h:h};
}

function drawLine(el,labels,vals,accent){
  const{ctx,w,h}=setupCanvas(el);
  const p={t:14,r:14,b:26,l:36};
  const cw=w-p.l-p.r,ch=h-p.t-p.b;
  const mn=Math.min(...vals)*0.92,mx=Math.max(...vals)*1.08,rng=mx-mn||1;
  const px=i=>p.l+(i/(vals.length-1))*cw;
  const py=v=>p.t+ch-((v-mn)/rng)*ch;
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+(ch/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));
  for(let i=1;i<vals.length;i++){const mx2=(px(i-1)+px(i))/2;ctx.bezierCurveTo(mx2,py(vals[i-1]),mx2,py(vals[i]),px(i),py(vals[i]));}
  ctx.lineTo(px(vals.length-1),p.t+ch);ctx.lineTo(px(0),p.t+ch);ctx.closePath();
  const grad=ctx.createLinearGradient(0,p.t,0,p.t+ch);
  grad.addColorStop(0,hexToRgba(accent,0.18));grad.addColorStop(1,hexToRgba(accent,0));
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));
  for(let i=1;i<vals.length;i++){const mx2=(px(i-1)+px(i))/2;ctx.bezierCurveTo(mx2,py(vals[i-1]),mx2,py(vals[i]),px(i),py(vals[i]));}
  ctx.strokeStyle=accent;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  ctx.font='9px system-ui,sans-serif';ctx.textAlign='center';
  vals.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(px(i),py(v),3,0,Math.PI*2);
    ctx.fillStyle=accent;ctx.fill();ctx.strokeStyle='#13131f';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(160,160,180,0.65)';ctx.fillText(labels[i],px(i),h-4);
  });
}

function drawBars(el,labels,vals,accent){
  const{ctx,w,h}=setupCanvas(el);
  const p={t:10,r:10,b:30,l:8};
  const n=labels.length,cw=w-p.l-p.r,ch=h-p.t-p.b;
  const bw=Math.min(cw/n*0.52,26),gap=cw/n;
  const mx=Math.max(...vals)*1.12||1;
  ctx.font='9px system-ui,sans-serif';ctx.textAlign='center';
  labels.forEach((lbl,i)=>{
    const x=p.l+i*gap+gap/2,bh=((vals[i]||0)/mx)*ch,y=p.t+ch-bh;
    ctx.fillStyle=hexToRgba(accent,0.85);
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x-bw/2,y,bw,bh,3);else ctx.rect(x-bw/2,y,bw,bh);ctx.fill();
    ctx.fillStyle='rgba(160,160,180,0.65)';ctx.fillText(lbl,x,h-4);
  });
}

function drawDualBars(el,labels,vals,accent){
  const{ctx,w,h}=setupCanvas(el);
  const p={t:20,r:10,b:30,l:8};
  const n=labels.length,cw=w-p.l-p.r,ch=h-p.t-p.b;
  const gW=cw/n,bw=Math.min(gW*0.28,16);
  const mx=Math.max(...vals.flat())*1.1||1;
  ctx.font='9px system-ui,sans-serif';ctx.textAlign='center';
  labels.forEach((lbl,i)=>{
    const cx=p.l+i*gW+gW/2;
    const bh1=((vals[i][0]||0)/mx)*ch;
    ctx.fillStyle=hexToRgba(accent,0.25);
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx-bw-1,p.t+ch-bh1,bw,bh1,2);else ctx.rect(cx-bw-1,p.t+ch-bh1,bw,bh1);ctx.fill();
    const bh2=((vals[i][1]||0)/mx)*ch;
    ctx.fillStyle=hexToRgba(accent,0.9);
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cx+1,p.t+ch-bh2,bw,bh2,2);else ctx.rect(cx+1,p.t+ch-bh2,bw,bh2);ctx.fill();
    ctx.fillStyle='rgba(160,160,180,0.65)';ctx.fillText(lbl,cx,h-4);
  });
  ctx.fillStyle=hexToRgba(accent,0.3);ctx.fillRect(p.l,6,7,5);
  ctx.fillStyle='rgba(150,150,170,0.7)';ctx.textAlign='left';ctx.fillText('Budget',p.l+10,12);
  ctx.fillStyle=hexToRgba(accent,0.9);ctx.fillRect(p.l+54,6,7,5);ctx.fillText('Actual',p.l+64,12);
}

function drawRing(el,labels,vals,accent,customColors){
  const{ctx,w,h}=setupCanvas(el);
  const cx=w*0.38,cy=h*0.5,ro=Math.min(w*0.32,h*0.40),ri=ro*0.56;
  const total=vals.reduce((a,b)=>a+b,0)||1;
  const palette=customColors||[accent,'rgba(160,160,180,0.4)','rgba(100,100,120,0.4)','rgba(60,60,80,0.4)'];
  let angle=-Math.PI/2;
  vals.forEach((v,i)=>{
    const sweep=(v/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,ro,angle,angle+sweep);ctx.closePath();
    ctx.fillStyle=palette[i%palette.length];ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);ctx.fillStyle='#13131f';ctx.fill();
    angle+=sweep;
  });
  const lx=w*0.70,ly=h/2-(labels.length*17)/2;
  ctx.font='9px system-ui,sans-serif';
  labels.forEach((lbl,i)=>{
    ctx.fillStyle=palette[i%palette.length];ctx.fillRect(lx,ly+i*17,7,7);
    ctx.fillStyle='rgba(160,160,180,0.75)';ctx.textAlign='left';ctx.fillText(lbl,lx+11,ly+i*17+7);
  });
}

    <div style="font-size:15px;font-weight:600;color:var(--text)">No Department Found</div>

    <a href="dept.html?dept=finance" style="margin-top:8px;padding:8px 18px;border:1px solid var(--border);border-radius:var(--r-md);font-size:13px;color:var(--text-dim);text-decoration:none">Browse Finance →</a>
  </div>`;
}

function fillQuery(q){document.getElementById('quick-q').value=q;document.getElementById('quick-q').focus();}
function askAgent(){const q=document.getElementById('quick-q').value.trim();if(q)sessionStorage.setItem('chat_prefill',q);window.location.href='app.html#chat';}
window.fillQuery=fillQuery;window.askAgent=askAgent;

(function init(){
  if(!localStorage.getItem('rapid_token')){window.location.href='index.html';return;}
  const user=getUser()||{};
  const urlDept=new URLSearchParams(window.location.search).get('dept');
  const permDepts=user.permitted_departments||[];
  const deptKey=urlDept||permDepts[0]||null;
  if(deptKey)render(deptKey,user);else renderMissing();
})();
})();
</script>
</body>
</html>
