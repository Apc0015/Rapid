name: RAPID CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      # Use a throwaway secret for CI — never commit real keys
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production
      RAPID_ENV: development
      ANTHROPIC_API_KEY: ""
      OPENROUTER_API_KEY: ""
      OLLAMA_BASE_URL: http://localhost:11434/v1
      OLLAMA_MODEL: llama3.2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required data dirs
        run: |
          mkdir -p data/db data/uploads logs
          # Provide a minimal users.yaml so auth tests can import without crash
          [ -f data/users.yaml ] || echo "{}" > data/users.yaml

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7
