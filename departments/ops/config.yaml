department:
  id: ops
  display_name: Operations
  reports_to: coo
  active: true

# ─────────────────────────────────────────────
# SKILLS
# ─────────────────────────────────────────────
skills:
  generate_reports:
    - id: process_efficiency_report
      name: Process Efficiency Report
      trigger_phrases:
        - "process efficiency"
        - "operational efficiency"
        - "process performance"
        - "how efficient are our processes"
        - "ops metrics"
      output_format: rag_status_table

    - id: sla_performance
      name: SLA Performance Report
      trigger_phrases:
        - "SLA performance"
        - "SLA compliance"
        - "are we meeting SLAs"
        - "service level compliance"
        - "SLA breach"
        - "SLA adherence"
      output_format: progress_with_variance

    - id: project_status
      name: Project Status Report
      trigger_phrases:
        - "project status"
        - "programme update"
        - "project health"
        - "what's the status of our projects"
        - "project dashboard"
        - "RAG status"
      output_format: rag_status_table

    - id: vendor_performance
      name: Vendor Performance Report
      trigger_phrases:
        - "vendor performance"
        - "supplier scorecard"
        - "how are our vendors performing"
        - "vendor scorecard"
        - "third party performance"
      output_format: scorecard

    - id: capacity_utilization
      name: Capacity Utilization Report
      trigger_phrases:
        - "capacity utilization"
        - "resource utilization"
        - "team capacity"
        - "are we over capacity"
        - "utilization rate"
      output_format: trend_chart_data

  calculations:
    - id: sla_compliance_pct
      name: SLA Compliance Percentage
      trigger_phrases:
        - "SLA compliance rate"
        - "what percentage of SLAs are we meeting"
        - "SLA score"

    - id: process_cycle_time
      name: Process Cycle Time
      trigger_phrases:
        - "cycle time"
        - "how long does the process take"
        - "average processing time"
        - "end to end time"

    - id: vendor_scorecard_calc
      name: Vendor Scorecard Calculator
      trigger_phrases:
        - "vendor score"
        - "calculate vendor performance"
        - "supplier rating"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

# ─────────────────────────────────────────────
# POLICY
# ─────────────────────────────────────────────
policy:
  working_rules:
    status_first: true                         # Always lead with RAG status (Red/Amber/Green)
    always_show_sla_compliance: true           # SLA compliance % must appear in every ops response
    always_show_risk_items: true               # Surface all Red and Amber items explicitly
    always_show_trend: true                    # Include period-over-period trend for all metrics
    default_period: current_month
    rag_thresholds:
      green_sla_min_pct: 95
      amber_sla_min_pct: 85
      red_sla_below_pct: 85
    include_open_incidents: true
    flag_projects_overdue: true
    flag_sla_at_risk: true                     # Flag SLAs at risk before breach occurs
    vendor_review_frequency_days: 90

  reply_style:
    format: executive_summary
    structure:
      - rag_status_summary           # Headline RAG: n Red, n Amber, n Green items
      - sla_compliance_pct           # Overall SLA compliance for the period with trend
      - project_status_snapshot      # Key project statuses with RAG and milestone dates
      - risk_items                   # All Red and Amber items with brief context
      - vendor_flags                 # Underperforming vendors or contract risks
      - recommended_actions          # Concise next steps (max 3 bullets)
    example: >
      Overall status: 2 Red, 4 Amber, 11 Green. SLA compliance is 91.3% MTD — Amber, down 2.4pp
      from last month (target 95%). ERP Migration is Red: 3 weeks behind schedule, budget 12%
      over baseline. Vendor Acme Logistics is Amber: on-time delivery at 82% vs. 90% SLA.
      Risk items: (1) ERP go-live at risk — escalation needed this week, (2) IT helpdesk SLA
      breach imminent if ticket volume holds. Recommended: (1) Convene ERP steering group,
      (2) Issue formal notice to Acme Logistics, (3) Redeploy 2 FTE to helpdesk queue.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Operations Agent"
      classification: "CONFIDENTIAL — Operations Only"
      footer: "Generated by RAPID. Verify with source system."

# ─────────────────────────────────────────────
# DEPT GOVERNANCE
# ─────────────────────────────────────────────
dept_governance:
  column_rules:
    allow:
      - project_id
      - project_name
      - project_phase
      - rag_status
      - start_date
      - target_end_date
      - actual_end_date
      - days_overdue
      - budget_baseline_usd
      - budget_actual_usd
      - budget_variance_pct
      - milestone_name
      - milestone_status
      - sla_id
      - sla_name
      - sla_target_pct
      - sla_actual_pct
      - sla_breach_count
      - sla_at_risk_flag
      - vendor_id
      - vendor_name
      - vendor_category
      - vendor_sla_score
      - vendor_delivery_pct
      - vendor_quality_score
      - vendor_overall_score
      - process_id
      - process_name
      - avg_cycle_time_hrs
      - throughput_per_day
      - defect_rate_pct
      - automation_rate_pct
      - capacity_utilization_pct        # Team-level aggregate only
      - capacity_status                 # Available | At Risk | Over Capacity
      - incident_count
      - incident_severity_breakdown
      - mttr_hrs                        # Mean Time To Resolve
    anonymize:
      - project_owner_name              # Replaced with "Owner [ID]"
      - incident_raised_by              # Replaced with "User [ID]"
    block:
      - vendor_contract_rate
      - vendor_negotiation_notes
      - internal_process_notes          # Free-text process weakness logs
      - team_individual_capacity        # Individual headcount / utilisation data
      - escalation_playbook_detail      # Internal escalation scripts and decision trees
      - vendor_pricing_breakdown
      - contract_renewal_strategy

  aggregation_rules:
    min_group_size: 1                   # Ops data is process/project-level, not person-level
    always_aggregate:
      - capacity_utilization            # Always show team-level aggregate, never individual
      - incident_log_aggregated         # Pre-aggregated; raw incident log is blocked

  sensitivity_levels:
    internal:
      - project_id
      - project_name
      - project_phase
      - milestone_name
      - sla_name
      - vendor_name
      - process_name
    confidential:
      - rag_status
      - budget_baseline_usd
      - budget_actual_usd
      - budget_variance_pct
      - sla_actual_pct
      - sla_breach_count
      - vendor_sla_score
      - vendor_overall_score
      - capacity_utilization_pct
      - incident_severity_breakdown
      - mttr_hrs
    restricted:
      - vendor_contract_rate
      - vendor_negotiation_notes
      - internal_process_notes
      - escalation_playbook_detail
      - team_individual_capacity
      - contract_renewal_strategy

# ─────────────────────────────────────────────
# PRIVACY RIGHTS
# ─────────────────────────────────────────────
privacy_rights:
  internal_only:
    - name: vendor_negotiation_terms
      description: >
        Negotiated contract rates, pricing schedules, volume discounts, penalty clauses,
        and renewal strategy for all vendor agreements.
      reason: >
        Vendor commercial terms are contractually confidential. Disclosure to non-authorised
        parties could invalidate NDAs and undermine negotiation leverage.
      blocks_topics:
        - "vendor contract rate"
        - "how much do we pay vendor"
        - "vendor pricing"
        - "contract renewal terms"
        - "vendor discount"

    - name: internal_process_weaknesses
      description: >
        Free-text notes, post-mortem findings, and internal assessments documenting
        known process gaps, failure modes, or operational vulnerabilities.
      reason: >
        Surfacing internal weakness documentation through AI channels creates audit and
        legal exposure and must remain within operational leadership.
      blocks_topics:
        - "process weaknesses"
        - "what are our operational gaps"
        - "post-mortem findings"
        - "known failure points"
        - "process vulnerabilities"

    - name: escalation_playbooks
      description: >
        Detailed internal escalation scripts, decision trees, and communication templates
        used during incidents and SLA breaches.
      reason: >
        Escalation playbooks contain internal authority levels and crisis procedures that
        must not be disclosed externally or through automated channels.
      blocks_topics:
        - "escalation playbook"
        - "escalation script"
        - "escalation process detail"
        - "who do we call in an incident"
        - "crisis procedure"

    - name: team_capacity_details
      description: >
        Individual headcount allocation, utilisation rates, and capacity plans at the
        team member level.
      reason: >
        Individual capacity data is HR-adjacent and must not be surfaced outside of
        direct management channels. Only team-level aggregates may be disclosed.
      blocks_topics:
        - "individual capacity"
        - "who has bandwidth"
        - "who is available"
        - "individual utilisation"
        - "headcount allocation by person"

  respond_with_when_blocked:
    message: >
      That information is managed internally and cannot be surfaced through this channel.
      Operations data shown here reflects process, project, and vendor metrics at the
      aggregate level, in line with RAPID governance policy.
    escalation_path: "Contact the COO or Head of Operations directly."

# ─────────────────────────────────────────────
# STRUCTURED PIPELINE (DB)
# ─────────────────────────────────────────────
structured_pipeline:
  enabled: true

  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - time_period
      - metric
      - filter_rag_status
      - filter_project_name
      - filter_vendor_name
      - filter_sla_name
      - filter_process_name
      - aggregation_level           # project | vendor | sla | process | total
      - comparison_period

  schema:
    databases:
      ops_management:
        type: postgresql
        host_env: OPS_DB_HOST
        port_env: OPS_DB_PORT
        name_env: OPS_DB_NAME
        user_env: OPS_DB_USER
        pass_env: OPS_DB_PASS
        ssl: true
        permitted_tables:
          projects:
            description: >
              Active and recently completed projects with RAG status, phase, milestone
              progress, and budget variance. Project owner names are anonymised at the
              governance layer. Free-text notes are blocked.
            permitted_columns:
              - project_id
              - project_name
              - project_phase
              - rag_status
              - start_date
              - target_end_date
              - actual_end_date
              - days_overdue
              - budget_baseline_usd
              - budget_actual_usd
              - budget_variance_pct
            blocked_columns:
              - project_owner_name
              - internal_notes
              - escalation_detail
              - vendor_contract_rate
            row_limit: 200

          sla_metrics:
            description: >
              SLA compliance metrics by SLA definition and period. Includes breach counts
              and at-risk flags. No individual incident records — pre-aggregated only.
            permitted_columns:
              - period
              - sla_id
              - sla_name
              - sla_category
              - sla_target_pct
              - sla_actual_pct
              - sla_breach_count
              - sla_at_risk_flag
              - mttr_hrs
            blocked_columns:
              - incident_owner_id
              - escalation_playbook_id
            row_limit: 200

          vendor_performance:
            description: >
              Vendor scorecard data covering delivery, quality, and SLA compliance.
              Commercial rates and contract terms are blocked.
            permitted_columns:
              - period
              - vendor_id
              - vendor_name
              - vendor_category
              - vendor_sla_score
              - vendor_delivery_pct
              - vendor_quality_score
              - vendor_overall_score
              - contract_expiry_date
            blocked_columns:
              - vendor_contract_rate
              - vendor_pricing_breakdown
              - vendor_negotiation_notes
              - contract_renewal_strategy
            row_limit: 100

          process_kpis:
            description: >
              Key performance indicators for operational processes: cycle time, throughput,
              defect rate, and automation coverage.
            permitted_columns:
              - period
              - process_id
              - process_name
              - process_category
              - avg_cycle_time_hrs
              - throughput_per_day
              - defect_rate_pct
              - automation_rate_pct
              - rag_status
            blocked_columns:
              - internal_process_notes
              - process_weakness_log
            row_limit: 200

          capacity_utilization:
            description: >
              Team-level capacity utilisation aggregates by department function and period.
              All rows are team-level; individual-level data is not stored in this table.
            permitted_columns:
              - period
              - function
              - capacity_utilization_pct
              - capacity_status
              - headcount_fte
              - open_roles_count
            blocked_columns:
              - individual_member_utilization
              - individual_allocation_detail
            row_limit: 100

          incident_log_aggregated:
            description: >
              Pre-aggregated incident summary by severity, category, and period.
              Raw incident records with owner details are not accessible through this table.
            permitted_columns:
              - period
              - severity
              - category
              - incident_count
              - avg_resolution_hrs
              - breach_count
              - repeat_incident_flag
            blocked_columns:
              - incident_raised_by
              - incident_owner_id
              - root_cause_freetext
              - escalation_notes
            row_limit: 100

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

# ─────────────────────────────────────────────
# UNSTRUCTURED PIPELINE (RAG)
# ─────────────────────────────────────────────
unstructured_pipeline:
  enabled: true

  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - process_documentation
      - standard_operating_procedures
      - project_charters
      - vendor_scorecards_published
      - sla_definitions
      - operational_policies
      - capacity_planning_frameworks
      - risk_registers_sanitised
      - audit_reports_published
      - business_continuity_plans_published
    rejected_topics:
      - vendor_contracts
      - escalation_playbooks
      - internal_process_weakness_logs
      - individual_capacity_plans
      - pricing_agreements
      - confidential_post_mortems

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query comes from the Operations department. Interpret acronyms and terminology in
      the context of enterprise operations management: SLA means Service Level Agreement,
      KPI means Key Performance Indicator, RAG means Red/Amber/Green status indicator,
      MTTR means Mean Time To Resolve, MTTD means Mean Time To Detect, BCP means Business
      Continuity Plan, SOP means Standard Operating Procedure, RACI means Responsible
      Accountable Consulted Informed, CAPA means Corrective And Preventive Action,
      OKR means Objectives and Key Results. Operations documents typically use precise,
      procedural language — queries should be interpreted literally.
    expand_abbreviations: true
    abbreviations:
      SLA: Service Level Agreement
      KPI: Key Performance Indicator
      RAG: Red Amber Green
      MTTR: Mean Time To Resolve
      MTTD: Mean Time To Detect
      BCP: Business Continuity Plan
      SOP: Standard Operating Procedure
      RACI: Responsible Accountable Consulted Informed
      CAPA: Corrective And Preventive Action
      OKR: Objectives and Key Results
      FTE: Full Time Equivalent
      RFP: Request For Proposal
      POC: Proof of Concept
      PMO: Project Management Office
      BAU: Business As Usual

  retriever:
    index_path: departments/ops/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 8
    use_hyde: false                 # Ops documents are procedural and factual — HyDE not needed
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

# ─────────────────────────────────────────────
# AGENT
# ─────────────────────────────────────────────
agent:
  persona: >
    You are the RAPID Operations Intelligence Agent. You provide operational leaders and programme
    managers with concise, status-led answers about project health, SLA compliance, vendor
    performance, and process efficiency. You lead every response with the RAG status summary —
    Red, Amber, Green counts — then provide SLA compliance context and surface all risk items
    explicitly. You do not disclose vendor commercial terms, internal process weakness logs,
    escalation playbook details, or individual team capacity data. When data is unavailable or
    blocked, you say so clearly and direct the user to the appropriate escalation path.
  confidence_threshold: 0.65
  escalates_to: coo
  can_consult:
    - it
    - procurement
    - finance
  output:
    always_include:
      - rag_status
      - sla_compliance
      - risk_items
      - trend
    format: executive_summary
    max_tokens: 800
