department:
  id: sales
  display_name: Sales
  reports_to: coo
  active: true

# ─────────────────────────────────────────────
# SKILLS
# ─────────────────────────────────────────────
skills:
  generate_reports:
    - id: pipeline_summary
      name: Pipeline Summary
      trigger_phrases:
        - "pipeline summary"
        - "show me the pipeline"
        - "pipeline overview"
        - "what's in the pipeline"
        - "total pipeline value"
      output_format: table_with_summary

    - id: win_loss_analysis
      name: Win/Loss Analysis
      trigger_phrases:
        - "win loss"
        - "win rate"
        - "why are we losing deals"
        - "win/loss breakdown"
        - "lost deals analysis"
      output_format: comparison_table

    - id: quota_attainment
      name: Quota Attainment Report
      trigger_phrases:
        - "quota attainment"
        - "quota performance"
        - "how are we tracking against quota"
        - "are we on track for quota"
        - "team quota"
      output_format: progress_with_variance

    - id: deal_velocity
      name: Deal Velocity Report
      trigger_phrases:
        - "deal velocity"
        - "how fast are deals closing"
        - "average deal cycle"
        - "sales cycle length"
        - "days to close"
      output_format: trend_chart_data

    - id: account_health
      name: Account Health Report
      trigger_phrases:
        - "account health"
        - "at-risk accounts"
        - "customer health score"
        - "churn risk"
        - "account status"
      output_format: rag_status_table

  calculations:
    - id: deal_margin
      name: Deal Margin Calculator
      trigger_phrases:
        - "deal margin"
        - "gross margin on deal"
        - "margin for this opportunity"
        - "what's the margin"

    - id: discount_impact
      name: Discount Impact Analysis
      trigger_phrases:
        - "discount impact"
        - "how much revenue does the discount cost"
        - "discount effect on ARR"
        - "total discount exposure"

    - id: arr_mrr
      name: ARR / MRR Calculator
      trigger_phrases:
        - "ARR"
        - "MRR"
        - "annual recurring revenue"
        - "monthly recurring revenue"
        - "what's our ARR"

    - id: quota_attainment_pct
      name: Quota Attainment Percentage
      trigger_phrases:
        - "quota attainment percent"
        - "what percent of quota"
        - "attainment rate"
        - "how close are we to quota"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

# ─────────────────────────────────────────────
# POLICY
# ─────────────────────────────────────────────
policy:
  working_rules:
    outcome_first: true                        # Always lead with the revenue number or deal status
    always_show_coverage_ratio: true           # Pipeline coverage ratio must appear in every pipeline response
    always_show_trend: true                    # Include period-over-period trend for all metrics
    default_period: current_quarter
    currency: USD
    round_to_nearest: 1000
    include_benchmark_comparison: true
    flag_deals_stale_after_days: 21
    highlight_at_risk_deals: true
    minimum_deal_size_to_surface: 10000

  reply_style:
    format: executive_summary
    structure:
      - headline_metric              # Revenue number, pipeline value, or primary KPI
      - pipeline_coverage_ratio      # Coverage vs. quota with trend indicator
      - win_rate                     # Current quarter win rate vs. prior quarter
      - key_movements                # Significant deals moved in/out of stage
      - risks_and_flags              # Stale deals, at-risk accounts, outliers
      - recommended_actions          # Concise next steps (max 3 bullets)
    example: >
      Q2 Pipeline stands at $14.2M against a $9.8M quota — 1.45x coverage (up from 1.31x last quarter).
      Win rate is 34% QTD, 4pp above Q1 close. Three enterprise deals ($2.1M combined) moved to
      Proposal stage this week. Two deals flagged stale (>21 days no activity). Recommended:
      (1) Prioritise TechCorp renewal renewal call, (2) Re-engage Apex Inc., (3) Review Stage 3 deals
      for Q2 pull-forward.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Sales Agent"
      classification: "CONFIDENTIAL — Sales Only"
      footer: "Generated by RAPID. Verify with source system."

# ─────────────────────────────────────────────
# DEPT GOVERNANCE
# ─────────────────────────────────────────────
dept_governance:
  column_rules:
    allow:
      - opportunity_id
      - account_name
      - stage
      - close_date
      - amount_usd
      - arr
      - mrr
      - deal_age_days
      - win_loss_flag
      - reason_lost_category        # Category only — not free-text notes
      - forecast_category
      - territory
      - product_line
      - quota_target_team           # Team-level only
      - attainment_pct_team         # Team-level only
      - pipeline_coverage_ratio
      - health_score
    anonymize:
      - rep_name                    # Replaced with "Rep [ID]" in output
      - account_executive_id
    block:
      - individual_rep_target
      - individual_rep_attainment
      - commission_details
      - commission_rate
      - deal_discount_floor
      - negotiation_notes
      - customer_pii
      - contact_email
      - contact_phone
      - legal_contract_terms
      - pricing_approval_notes

  aggregation_rules:
    min_group_size: 3               # Never surface metrics for groups smaller than 3 reps
    always_aggregate:
      - rep_performance_aggregated
      - quota_targets               # Return team totals, never individual targets

  sensitivity_levels:
    internal:
      - opportunity_id
      - stage
      - close_date
      - forecast_category
      - territory
    confidential:
      - amount_usd
      - arr
      - mrr
      - deal_age_days
      - win_loss_flag
      - quota_target_team
      - attainment_pct_team
      - pipeline_coverage_ratio
    restricted:
      - commission_details
      - deal_discount_floor
      - individual_rep_target
      - negotiation_notes
      - legal_contract_terms

# ─────────────────────────────────────────────
# PRIVACY RIGHTS
# ─────────────────────────────────────────────
privacy_rights:
  internal_only:
    - name: individual_rep_performance
      description: Performance metrics, attainment, and activity data at the individual sales rep level.
      reason: Surfacing individual performance creates legal exposure and contravenes HR data policies.
      blocks_topics:
        - "who is the top performer"
        - "which rep closed the most"
        - "rep attainment breakdown"
        - "individual quota"
        - "rep commission"

    - name: deal_pricing_strategy
      description: Discount floors, pricing approval thresholds, and deal-level margin guidance.
      reason: Disclosure could compromise negotiation position and violate competitive confidentiality.
      blocks_topics:
        - "what is the discount floor"
        - "maximum discount we can give"
        - "pricing strategy for this deal"
        - "approved margin threshold"

    - name: negotiation_positions
      description: Internal notes on customer negotiation posture, BATNA, and escalation triggers.
      reason: These notes are attorney-work-product adjacent and operationally sensitive.
      blocks_topics:
        - "negotiation notes"
        - "what's our walk-away"
        - "deal tactics"
        - "escalation trigger for this account"

    - name: commission_structure_details
      description: Individual commission rates, accelerators, and compensation plan specifics.
      reason: Compensation data is HR-controlled and must not be disclosed through AI channels.
      blocks_topics:
        - "commission rate"
        - "accelerator threshold"
        - "OTE breakdown"
        - "comp plan details"

    - name: customer_contract_terms
      description: Signed contract values, payment terms, SLA commitments, and penalty clauses.
      reason: Contract data is legally privileged and subject to NDA — Legal department controls disclosure.
      blocks_topics:
        - "contract value"
        - "payment terms"
        - "SLA in contract"
        - "penalty clause"

  respond_with_when_blocked:
    message: >
      That information is managed internally and cannot be surfaced through this channel.
      Sales data shown here reflects team-level aggregates in line with RAPID governance policy.
    escalation_path: "Contact the Head of Sales or Revenue Operations directly."

# ─────────────────────────────────────────────
# STRUCTURED PIPELINE (DB)
# ─────────────────────────────────────────────
structured_pipeline:
  enabled: true

  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - time_period
      - metric
      - filter_stage
      - filter_territory
      - filter_product_line
      - aggregation_level           # team | territory | product | total
      - comparison_period

  schema:
    databases:
      sales_crm:
        type: postgresql
        host_env: SALES_DB_HOST
        port_env: SALES_DB_PORT
        name_env: SALES_DB_NAME
        user_env: SALES_DB_USER
        pass_env: SALES_DB_PASS
        ssl: true
        permitted_tables:
          pipeline_opportunities:
            description: >
              Active and recently closed sales opportunities with stage, value, and forecast
              category. One row per opportunity. Individual rep identifiers are anonymised at
              the governance layer.
            permitted_columns:
              - opportunity_id
              - account_name
              - stage
              - close_date
              - amount_usd
              - arr
              - mrr
              - deal_age_days
              - forecast_category
              - territory
              - product_line
              - health_score
            blocked_columns:
              - rep_id
              - individual_rep_target
              - deal_discount_floor
              - negotiation_notes
              - contact_email
              - contact_phone
            row_limit: 500

          deal_stages:
            description: >
              Stage transition history for each opportunity, used for velocity and conversion
              analysis. Timestamps only — no rep-level attribution.
            permitted_columns:
              - opportunity_id
              - from_stage
              - to_stage
              - transitioned_at
              - days_in_stage
            blocked_columns: []
            row_limit: 1000

          account_summary:
            description: >
              Account-level health, segment, ARR, and renewal date. Used for account health
              and at-risk reporting.
            permitted_columns:
              - account_id
              - account_name
              - segment
              - industry
              - current_arr
              - health_score
              - renewal_date
              - territory
              - open_opportunities_count
            blocked_columns:
              - primary_contact_email
              - primary_contact_phone
              - contract_value
              - legal_contract_terms
            row_limit: 200

          quota_targets:
            description: >
              Team and territory-level quota targets for the current and prior fiscal year.
              Individual rep targets are blocked.
            permitted_columns:
              - period
              - territory
              - product_line
              - quota_usd_team
              - attainment_usd_team
              - attainment_pct_team
            blocked_columns:
              - rep_id
              - individual_rep_target
              - individual_attainment
            row_limit: 100

          win_loss_log:
            description: >
              Closed-won and closed-lost records with loss category and competitive context.
              Free-text notes are blocked; only categorised fields are surfaced.
            permitted_columns:
              - opportunity_id
              - account_name
              - close_date
              - amount_usd
              - outcome
              - reason_lost_category
              - competitor_displaced
              - territory
              - product_line
            blocked_columns:
              - rep_id
              - loss_notes_freetext
              - pricing_notes
              - negotiation_notes
            row_limit: 300

          rep_performance_aggregated:
            description: >
              Pre-aggregated team performance metrics. No individual rep rows — all data
              is rolled up to territory or team level before storage.
            permitted_columns:
              - period
              - territory
              - deals_closed
              - total_arr_closed
              - win_rate_pct
              - avg_deal_size
              - avg_sales_cycle_days
            blocked_columns: []
            row_limit: 50

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

# ─────────────────────────────────────────────
# UNSTRUCTURED PIPELINE (RAG)
# ─────────────────────────────────────────────
unstructured_pipeline:
  enabled: true

  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - sales_playbooks
      - account_plans
      - competitive_intelligence
      - product_positioning
      - sales_training_materials
      - territory_plans
      - qbr_decks
      - battlecards
      - rfp_responses_sanitised
    rejected_topics:
      - individual_compensation
      - legal_contracts
      - hr_records
      - customer_pii_documents
      - pricing_approval_memos

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query comes from the Sales department. Interpret acronyms and terminology in the
      context of B2B SaaS sales: ARR means Annual Recurring Revenue, MRR means Monthly
      Recurring Revenue, QBR means Quarterly Business Review, ICP means Ideal Customer Profile,
      MEDDIC refers to the qualification framework, and stages (Discovery, Demo, Proposal,
      Negotiation, Closed Won/Lost) refer to the CRM opportunity pipeline.
    expand_abbreviations: true
    abbreviations:
      ARR: Annual Recurring Revenue
      MRR: Monthly Recurring Revenue
      QBR: Quarterly Business Review
      ICP: Ideal Customer Profile
      ACV: Annual Contract Value
      TCV: Total Contract Value
      SDR: Sales Development Representative
      AE: Account Executive
      CSM: Customer Success Manager
      MEDDIC: Metrics, Economic Buyer, Decision Criteria, Decision Process, Identify Pain, Champion
      POC: Proof of Concept
      ROI: Return on Investment

  retriever:
    index_path: departments/sales/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 8
    use_hyde: false                 # Sales docs are factual CRM/playbook content — HyDE not needed
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

# ─────────────────────────────────────────────
# AGENT
# ─────────────────────────────────────────────
agent:
  persona: >
    You are the RAPID Sales Intelligence Agent. You provide revenue leaders and account executives
    with concise, data-driven answers about pipeline health, deal progression, and quota performance.
    You lead every response with the key revenue metric or status, follow with coverage and win-rate
    context, and close with a maximum of three actionable recommendations. You never speculate about
    individual rep performance or disclose pricing strategy. When data is unavailable or blocked,
    you say so clearly and direct the user to the appropriate escalation path.
  confidence_threshold: 0.65
  escalates_to: coo
  can_consult:
    - marketing
    - finance
    - legal
  output:
    always_include:
      - pipeline_value
      - coverage_ratio
      - win_rate
      - trend
    format: executive_summary
    max_tokens: 800
