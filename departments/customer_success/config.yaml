department:
  id: customer_success
  display_name: Customer Success
  reports_to: coo
  active: true

skills:
  generate_reports:
    - id: nps_summary
      name: NPS Summary Report
      trigger_phrases:
        - "NPS summary"
        - "net promoter score"
        - "NPS trend"
        - "how is NPS"
        - "customer satisfaction score"
        - "promoters and detractors"
      output_format: metric_cards

    - id: churn_risk_report
      name: Churn Risk Report
      trigger_phrases:
        - "churn risk"
        - "customers at risk"
        - "who might churn"
        - "churn report"
        - "at-risk accounts"
        - "churn rate"
      output_format: risk_dashboard

    - id: onboarding_health
      name: Onboarding Health Report
      trigger_phrases:
        - "onboarding health"
        - "onboarding status"
        - "new customer onboarding"
        - "time to value"
        - "onboarding pipeline"
      output_format: table_with_summary

    - id: renewal_pipeline
      name: Renewal Pipeline Report
      trigger_phrases:
        - "renewal pipeline"
        - "upcoming renewals"
        - "contracts renewing"
        - "renewal forecast"
        - "renewal rate"
      output_format: pipeline_board

    - id: customer_health_score
      name: Customer Health Score Report
      trigger_phrases:
        - "customer health"
        - "health score"
        - "account health"
        - "green yellow red accounts"
        - "health score distribution"
      output_format: scorecard

  calculations:
    - id: net_revenue_retention
      name: Net Revenue Retention (NRR)
      trigger_phrases:
        - "NRR"
        - "net revenue retention"
        - "revenue retention rate"
        - "expansion minus churn"

    - id: churn_rate
      name: Churn Rate
      trigger_phrases:
        - "churn rate"
        - "customer churn"
        - "what percent churned"
        - "monthly churn"
        - "annual churn"

    - id: time_to_value
      name: Time to Value (TTV)
      trigger_phrases:
        - "time to value"
        - "TTV"
        - "how long to first value"
        - "onboarding speed"
        - "time to go live"

    - id: expansion_revenue
      name: Expansion Revenue
      trigger_phrases:
        - "expansion revenue"
        - "upsell revenue"
        - "cross-sell revenue"
        - "revenue from existing customers"
        - "expansion MRR"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    customer_first: true
    lead_with_health_status: "Always open with overall customer health distribution (green/yellow/red) before any other metric."
    show_nps_trend: true
    show_churn_risk_count: true
    churn_risk_flag_threshold_score: 40
    renewal_warning_days: 90
    flag_onboarding_overdue: true
    onboarding_overdue_threshold_days: 30
    include_nrr_trend: true
    trend_period_days: 30
    never_expose_individual_feedback_verbatim: true
    never_expose_individual_contract_values: true
    never_expose_escalation_case_details: true
    never_expose_pre_review_csat: true

  reply_style:
    format: structured_report
    structure:
      - customer_health_distribution
      - nps_score_and_trend
      - churn_risk_count
      - renewal_pipeline_summary
      - nrr
      - recommended_actions
    example: >
      CUSTOMER HEALTH: 142 accounts — 98 Green, 31 Yellow, 13 Red.
      NPS: Score 42 (up 3 pts vs prior period). Promoters: 54%, Detractors: 12%.
      CHURN RISK: 13 accounts flagged at risk. 4 in active escalation.
      RENEWALS: $2.1M in renewals due within 90 days — 78% forecast to close.
      NRR: 107% (target: 110%). Expansion revenue: $340K this quarter.
      ACTION REQUIRED: 4 Red accounts require CSM outreach within 48 hours.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Customer Success Agent"
      classification: "CONFIDENTIAL — Customer Success Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - customer_segment
      - industry
      - region
      - health_score
      - health_category
      - nps_score_avg
      - nps_response_count
      - promoter_pct
      - passive_pct
      - detractor_pct
      - churn_risk_score
      - churn_risk_category
      - churn_reason_category
      - onboarding_status
      - onboarding_days_elapsed
      - time_to_value_days
      - renewal_date
      - renewal_stage
      - renewal_forecast_category
      - support_tickets_open
      - support_tickets_closed
      - avg_resolution_days
      - expansion_revenue_segment
      - nrr_pct
      - churn_count
      - churn_rate_pct
    anonymize:
      - account_name
      - csm_assigned
      - customer_contact_name
      - customer_contact_email
    block:
      - individual_customer_feedback_verbatim
      - customer_contract_value
      - escalation_case_notes
      - individual_nps_respondent
      - pre_review_csat_raw
      - customer_internal_escalation_detail
      - contract_discount_rate

  aggregation_rules:
    min_group_size: 5
    always_aggregate:
      - nps_by_segment
      - churn_rate_by_industry
      - health_scores_by_region

  sensitivity_levels:
    internal:
      - health_score
      - churn_risk_score
      - nps_score_avg
      - onboarding_status
    confidential:
      - churn_reason_category
      - renewal_stage
      - expansion_revenue_segment
      - nrr_pct
    restricted:
      - individual_customer_feedback_verbatim
      - customer_contract_value
      - escalation_case_notes
      - individual_nps_respondent
      - pre_review_csat_raw

privacy_rights:
  internal_only:
    - name: individual_customer_feedback_verbatims
      description: Verbatim text responses from individual customers in NPS surveys, CSAT surveys, and support interactions.
      reason: Verbatim feedback is personally attributable and disclosing it without consent violates customer trust and may breach data privacy regulations.
      blocks_topics:
        - "what did the customer say"
        - "verbatim feedback"
        - "customer quote"
        - "NPS comment"
        - "survey response text"

    - name: escalation_case_details
      description: Detailed case notes, internal communications, and resolution history for escalated customer accounts.
      reason: Escalation details contain sensitive account intelligence and internal commitments that could be misused or misinterpreted out of context.
      blocks_topics:
        - "escalation details"
        - "what happened with this account"
        - "escalation notes"
        - "case history"
        - "internal escalation"

    - name: customer_contract_values
      description: Individual customer ARR, MRR, contract value, and discount rates.
      reason: Individual contract values are commercially sensitive and disclosing them could undermine pricing consistency and create legal exposure.
      blocks_topics:
        - "contract value"
        - "how much does customer pay"
        - "ARR by account"
        - "customer revenue"
        - "account contract size"

    - name: internal_csat_pre_review
      description: CSAT scores collected internally before the formal review and calibration process is complete.
      reason: Pre-review scores are uncalibrated and subject to change; disclosing them could create inaccurate performance records.
      blocks_topics:
        - "CSAT pre-review"
        - "draft CSAT"
        - "uncalibrated satisfaction scores"
        - "internal CSAT before review"

  respond_with_when_blocked:
    message: >
      This information is subject to Customer Data Privacy Policy and cannot be disclosed
      through this channel. Individual customer feedback, contract values, and escalation
      details are restricted to authorized Customer Success leadership and Legal review.
      Please contact your CS Director or submit a formal data access request.
    escalation_path: cs_director

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - customer_segment
      - region
      - time_range
      - report_type
      - metric_requested
      - health_category_filter

  schema:
    databases:
      cs_db:
        type: postgresql
        host_env: CUSTOMER_SUCCESS_DB_HOST
        port_env: CUSTOMER_SUCCESS_DB_PORT
        name_env: CUSTOMER_SUCCESS_DB_NAME
        user_env: CUSTOMER_SUCCESS_DB_USER
        pass_env: CUSTOMER_SUCCESS_DB_PASS
        ssl: true
        permitted_tables:
          customer_health_scores:
            description: Aggregated customer health scores by segment and region. Individual account names anonymized.
            permitted_columns:
              - customer_segment
              - industry
              - region
              - health_score
              - health_category
              - support_tickets_open
              - avg_resolution_days
              - period
            blocked_columns:
              - account_name
              - csm_name
              - contract_value
            row_limit: 500

          nps_responses_agg:
            description: Aggregated NPS data by segment and period. Individual respondent details excluded.
            permitted_columns:
              - period
              - customer_segment
              - region
              - nps_score_avg
              - nps_response_count
              - promoter_pct
              - passive_pct
              - detractor_pct
            blocked_columns:
              - respondent_id
              - respondent_name
              - verbatim_text
              - respondent_email
            row_limit: 200

          churn_risk_log:
            description: Churn risk scoring by segment and risk category. Account-level details anonymized.
            permitted_columns:
              - customer_segment
              - industry
              - region
              - churn_risk_category
              - churn_risk_score_avg
              - account_count
              - churn_reason_category
              - period
            blocked_columns:
              - account_name
              - csm_notes
              - escalation_detail
              - contract_value
            row_limit: 200

          onboarding_status:
            description: Onboarding pipeline status by segment with time-to-value tracking.
            permitted_columns:
              - customer_segment
              - industry
              - onboarding_status
              - onboarding_days_elapsed
              - time_to_value_days
              - account_count
              - overdue_flag
              - period
            blocked_columns:
              - account_name
              - csm_assigned
              - customer_contact_email
            row_limit: 200

          renewal_pipeline:
            description: Renewal pipeline summary by stage and segment. Individual contract values excluded.
            permitted_columns:
              - customer_segment
              - industry
              - region
              - renewal_date_month
              - renewal_stage
              - renewal_forecast_category
              - account_count
              - period
            blocked_columns:
              - account_name
              - contract_value
              - discount_rate
              - csm_notes
            row_limit: 300

          support_tickets_agg:
            description: Support ticket volumes and resolution metrics aggregated by segment and type.
            permitted_columns:
              - customer_segment
              - ticket_category
              - severity
              - tickets_open
              - tickets_closed
              - avg_resolution_days
              - sla_met_pct
              - period
            blocked_columns:
              - account_name
              - ticket_detail_raw
              - customer_email
            row_limit: 300

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - customer success playbooks
      - onboarding documentation
      - NPS methodology
      - churn prevention strategies
      - renewal management
      - customer health frameworks
      - QBR (quarterly business review) templates
      - support escalation procedures
      - expansion and upsell guides
      - CSM best practices
      - SLA documentation
    rejected_topics:
      - individual customer verbatim feedback
      - escalation case notes personal
      - individual contract values
      - customer PII
      - pre-review CSAT data
      - individual NPS respondent data

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This is a Customer Success department context. Documents use SaaS customer success
      terminology including health scoring, churn prediction, net revenue retention (NRR),
      gross revenue retention (GRR), time to value (TTV), expansion MRR, QBR frameworks,
      and customer lifecycle stages (onboarding, adoption, expansion, renewal). Expand
      CS-specific acronyms and map to standard SaaS customer success meanings.
    expand_abbreviations: true
    abbreviations:
      NPS: Net Promoter Score
      CSAT: Customer Satisfaction Score
      CES: Customer Effort Score
      NRR: Net Revenue Retention
      GRR: Gross Revenue Retention
      MRR: Monthly Recurring Revenue
      ARR: Annual Recurring Revenue
      TTV: Time to Value
      CSM: Customer Success Manager
      QBR: Quarterly Business Review
      EBR: Executive Business Review
      POC: Point of Contact
      SLA: Service Level Agreement
      TAM: Technical Account Manager
      VOC: Voice of Customer

  retriever:
    index_path: departments/customer_success/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 5
    use_hyde: false
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    You are the RAPID Customer Success Agent. You assist Customer Success and Operations
    teams by surfacing customer health scores, NPS trends, churn risk, onboarding status,
    and renewal pipeline intelligence. You always lead with the overall customer health
    distribution (green/yellow/red). You never expose individual customer verbatim feedback,
    individual contract values, escalation case notes, or pre-review CSAT scores. You
    proactively flag Red accounts and upcoming renewals requiring action.
  confidence_threshold: 0.65
  escalates_to: cs_director
  can_consult:
    - sales
    - marketing
    - ops
  output:
    always_include:
      - nps_score
      - churn_risk_count
      - health_score_avg
      - renewal_rate
    format: executive_summary
    max_tokens: 800
