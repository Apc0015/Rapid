department:
  id: it
  display_name: Information Technology
  reports_to: cto
  active: true

skills:
  generate_reports:
    - id: incident_summary
      name: Incident Summary Report
      trigger_phrases:
        - "show incidents"
        - "incident summary"
        - "open tickets"
        - "what incidents are open"
        - "P1 incidents"
        - "active issues"
      output_format: table_with_summary

    - id: system_uptime_report
      name: System Uptime Report
      trigger_phrases:
        - "system uptime"
        - "availability report"
        - "which systems are down"
        - "uptime this month"
        - "SLA uptime"
      output_format: metric_cards

    - id: asset_inventory_summary
      name: Asset Inventory Summary
      trigger_phrases:
        - "asset inventory"
        - "how many devices"
        - "hardware assets"
        - "software licenses"
        - "inventory summary"
      output_format: table_with_summary

    - id: security_posture
      name: Security Posture Report
      trigger_phrases:
        - "security posture"
        - "security status"
        - "vulnerability summary"
        - "patch compliance"
        - "security incidents"
      output_format: risk_dashboard

    - id: sla_compliance
      name: SLA Compliance Report
      trigger_phrases:
        - "SLA compliance"
        - "SLA breach"
        - "response time SLA"
        - "resolution SLA"
        - "are we meeting SLA"
      output_format: compliance_scorecard

  calculations:
    - id: mttr
      name: Mean Time to Resolve (MTTR)
      trigger_phrases:
        - "MTTR"
        - "mean time to resolve"
        - "average resolution time"
        - "how long to fix incidents"

    - id: system_availability
      name: System Availability Percentage
      trigger_phrases:
        - "system availability"
        - "availability percent"
        - "uptime percentage"
        - "nine nines"

    - id: license_utilization
      name: License Utilization Percentage
      trigger_phrases:
        - "license utilization"
        - "unused licenses"
        - "license efficiency"
        - "how many licenses used"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    severity_first: true
    lead_with_severity: "Always open with P1/P2/P3 breakdown before any other metric."
    show_open_incidents: true
    show_sla_breach_risk: true
    sla_breach_warning_threshold_pct: 80
    escalate_p1_immediately: true
    p1_escalation_window_minutes: 15
    p2_escalation_window_hours: 2
    include_trend_comparison: true
    trend_period_days: 30
    never_expose_raw_logs: true
    never_expose_credentials: true

  reply_style:
    format: structured_report
    structure:
      - severity_breakdown
      - open_incidents_count
      - sla_compliance_status
      - system_availability
      - trend_vs_prior_period
      - recommended_actions
    example: >
      SEVERITY BREAKDOWN: P1: 2 open | P2: 5 open | P3: 14 open.
      SLA BREACH RISK: 3 incidents approaching breach window.
      AVAILABILITY: Core systems at 99.7% (30-day). Trend: -0.1% vs prior period.
      ACTION REQUIRED: 2 P1 incidents pending root cause sign-off.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "IT Agent"
      classification: "CONFIDENTIAL — IT Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - incident_id
      - incident_title
      - severity
      - status
      - assigned_team
      - created_at
      - resolved_at
      - system_name
      - uptime_pct
      - asset_tag
      - asset_type
      - asset_status
      - department_owner
      - license_name
      - licenses_total
      - licenses_used
      - sla_target_hours
      - sla_actual_hours
      - sla_met
    anonymize:
      - assigned_engineer
      - reported_by
      - customer_impacted
      - incident_reporter_email
    block:
      - raw_credentials
      - system_passwords
      - security_keys
      - vulnerability_exploit_details
      - internal_ip_ranges
      - cve_unpatched_detail
      - pentest_findings_raw
      - acl_raw
      - root_cause_analysis_full
      - system_architecture_diagram_url

  aggregation_rules:
    min_group_size: 3
    always_aggregate:
      - security_incidents_by_type
      - patch_compliance_by_system
      - license_utilization_by_dept

  sensitivity_levels:
    internal:
      - incident_title
      - system_name
      - sla_actual_hours
      - asset_tag
    confidential:
      - severity
      - security_incidents_count
      - patch_compliance_pct
      - acl_summary
    restricted:
      - vulnerability_detail
      - pentest_summary
      - root_cause_analysis_full
      - internal_ip_ranges

privacy_rights:
  internal_only:
    - name: security_vulnerability_details
      description: CVEs identified but not yet patched, including affected systems and exploit vectors.
      reason: Disclosure before patching creates active attack surface risk.
      blocks_topics:
        - "CVE details"
        - "unpatched vulnerabilities"
        - "which systems are unpatched"
        - "exploit details"

    - name: incident_root_cause_analysis
      description: Full post-incident root cause analysis reports containing system failure details.
      reason: Contains sensitive architectural and process information; released only after review.
      blocks_topics:
        - "root cause"
        - "why did the system fail"
        - "full RCA"
        - "incident post-mortem"

    - name: system_architecture_details
      description: Internal network topology, system architecture diagrams, and IP ranges.
      reason: Exposure of architecture aids adversarial targeting and reconnaissance.
      blocks_topics:
        - "network map"
        - "system architecture"
        - "internal IP"
        - "infrastructure topology"

    - name: access_control_lists
      description: Raw ACL entries, user permission matrices, and role assignment details.
      reason: ACL exposure enables privilege escalation or lateral movement by malicious actors.
      blocks_topics:
        - "who has access to"
        - "permission matrix"
        - "access control list"
        - "user roles raw"

    - name: penetration_test_results
      description: Results and findings from internal and third-party penetration tests.
      reason: Pentest findings are exploitable intelligence if exposed prematurely.
      blocks_topics:
        - "pentest results"
        - "penetration test"
        - "red team findings"
        - "security audit raw"

  respond_with_when_blocked:
    message: >
      This information is classified under IT Security Policy and cannot be disclosed
      through this channel. Please contact the IT Security team directly or raise a
      request via the secure ITSM portal.
    escalation_path: it_security_lead

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - severity_filter
      - system_name
      - time_range
      - report_type
      - metric_requested

  schema:
    databases:
      it_ops_db:
        type: postgresql
        host_env: IT_DB_HOST
        port_env: IT_DB_PORT
        name_env: IT_DB_NAME
        user_env: IT_DB_USER
        pass_env: IT_DB_PASS
        ssl: true
        permitted_tables:
          incidents_summary:
            description: Aggregated incident records with severity, status, and SLA tracking. No raw logs or credentials.
            permitted_columns:
              - incident_id
              - incident_title
              - severity
              - status
              - assigned_team
              - created_at
              - resolved_at
              - sla_target_hours
              - sla_actual_hours
              - sla_met
            blocked_columns:
              - root_cause_raw
              - internal_notes
              - reporter_email
            row_limit: 500

          system_uptime:
            description: Daily system availability metrics per system name.
            permitted_columns:
              - system_name
              - date
              - uptime_pct
              - downtime_minutes
              - incidents_linked
            blocked_columns:
              - internal_ip
              - host_config_raw
            row_limit: 1000

          asset_inventory:
            description: Hardware and software asset register with ownership and status.
            permitted_columns:
              - asset_tag
              - asset_type
              - asset_name
              - status
              - department_owner
              - purchase_date
              - warranty_expiry
            blocked_columns:
              - serial_number_raw
              - vendor_contract_id
            row_limit: 1000

          security_incidents_agg:
            description: Aggregated security event counts by type and severity. Raw CVE or exploit data excluded.
            permitted_columns:
              - incident_type
              - severity
              - count
              - period
              - status
            blocked_columns:
              - cve_detail
              - affected_system_ip
              - exploit_vector
            row_limit: 200

          sla_compliance:
            description: SLA performance metrics by team and priority level.
            permitted_columns:
              - team
              - priority
              - total_incidents
              - sla_met_count
              - sla_breached_count
              - sla_compliance_pct
              - period
            blocked_columns: []
            row_limit: 200

          license_usage:
            description: Software license allocation and utilization per product.
            permitted_columns:
              - license_name
              - vendor
              - licenses_total
              - licenses_used
              - licenses_available
              - utilization_pct
              - renewal_date
            blocked_columns:
              - license_key_raw
              - vendor_negotiated_price
            row_limit: 200

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - incident management
      - system uptime
      - IT infrastructure
      - SLA policy
      - asset management
      - software licensing
      - IT governance
      - change management
      - patch management
      - disaster recovery
      - IT security policy
      - helpdesk procedures
    rejected_topics:
      - financial records
      - HR personnel files
      - legal contracts
      - customer PII
      - raw network logs
      - penetration test reports

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This is an IT Operations and Security department context. Documents may use ITSM
      terminology (P1/P2/P3 severity, MTTR, SLA, CMDB, ITIL), infrastructure terms
      (availability zones, failover, RTO/RPO), and security frameworks (CVE, CVSS, SOC 2,
      ISO 27001). Expand acronyms and map operational terms to their standard IT meanings.
    expand_abbreviations: true
    abbreviations:
      MTTR: Mean Time to Resolve
      MTTD: Mean Time to Detect
      SLA: Service Level Agreement
      CMDB: Configuration Management Database
      ITIL: IT Infrastructure Library
      RTO: Recovery Time Objective
      RPO: Recovery Point Objective
      CVE: Common Vulnerabilities and Exposures
      CVSS: Common Vulnerability Scoring System
      P1: Priority 1 (Critical)
      P2: Priority 2 (High)
      P3: Priority 3 (Medium)

  retriever:
    index_path: departments/it/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 5
    use_hyde: false
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    You are the RAPID IT Agent. You assist IT Operations, Security, and Infrastructure teams
    by surfacing incident status, system health, SLA compliance, and asset data. You lead
    every response with severity classification and open incident count. You never expose
    raw credentials, security keys, unpatched CVE details, or internal network topology.
    You escalate P1 incidents immediately and flag any SLA breach risk proactively.
  confidence_threshold: 0.65
  escalates_to: it_manager
  can_consult:
    - ops
    - rd
  output:
    always_include:
      - open_incidents
      - sla_compliance
      - severity_breakdown
      - trend
    format: executive_summary
    max_tokens: 800
