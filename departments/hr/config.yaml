department:
  id: hr
  display_name: Human Resources
  reports_to: cfo
  active: true

skills:
  generate_reports:
    - id: headcount_summary_report
      name: Headcount Summary
      trigger_phrases: ["headcount", "total employees", "staff count", "workforce size", "headcount by department"]
      output_format: structured_table
    - id: attrition_report
      name: Attrition Report
      trigger_phrases: ["attrition", "turnover", "employee turnover", "resignation rate", "voluntary attrition"]
      output_format: table_with_chart_data
    - id: leave_utilisation_report
      name: Leave Utilisation Report
      trigger_phrases: ["leave utilisation", "annual leave", "sick leave", "leave balance", "time off"]
      output_format: structured_table
    - id: org_chart_report
      name: Org Chart
      trigger_phrases: ["org chart", "organisation chart", "reporting structure", "team structure", "hierarchy"]
      output_format: narrative_with_numbers
    - id: recruitment_pipeline_report
      name: Recruitment Pipeline
      trigger_phrases: ["recruitment", "hiring pipeline", "open roles", "candidates", "talent pipeline", "job vacancies"]
      output_format: table_with_chart_data
  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    always_show_trend: true
    always_show_benchmark: true
    benchmark_source: "industry median where available"
    people_data_requires_context: true
    minimum_cohort_size_for_reporting: 5
    suppress_individual_data: true
    anonymise_below_cohort_threshold: true
    flag_attrition_above_pct: 15
    flag_vacancy_duration_days: 60
  reply_style:
    format: context_first
    structure:
      - Open with the organisational or situational context for the metric
      - Present the headline figure with relevant cohort breakdown
      - Show trend over the last 3–4 periods
      - Benchmark against industry or internal target where available
      - Close with one-line interpretation or recommended area of attention
    example: >
      Across the Engineering department (210 FTEs as of Q2 FY2025), voluntary
      attrition reached 11.4% — up from 8.9% in Q1 and above the tech sector
      median of 9.8%. The increase is concentrated in the IC3–IC4 band, where
      three consecutive quarters of elevated exits have been recorded.
      Recommend reviewing compensation banding and career progression pathways
      for this cohort.
  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "HR Agent"
      classification: "CONFIDENTIAL — HR Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - department_id
      - department_name
      - headcount_total
      - headcount_by_level
      - headcount_by_function
      - attrition_rate
      - voluntary_attrition_count
      - involuntary_attrition_count
      - leave_days_taken
      - leave_days_balance
      - leave_type
      - open_roles_count
      - avg_time_to_fill_days
      - training_completion_rate
      - offer_acceptance_rate
      - fiscal_quarter
      - period
    anonymize:
      - manager_name
      - manager_id
      - recruiter_name
      - job_posting_id
    block:
      - ssn
      - individual_salary
      - date_of_birth
      - personal_email
      - home_address
      - performance_rating_individual
      - disciplinary_record
      - compensation_negotiation_note
      - succession_candidate_flag
      - individual_bonus_target
      - medical_leave_reason
      - exit_interview_verbatim
  aggregation_rules:
    min_group_size: 5
    always_aggregate:
      - individual_salary
      - performance_rating_individual
      - leave_days_taken
      - individual_bonus_target
  sensitivity_levels:
    internal:
      - headcount_total
      - attrition_rate
      - open_roles_count
      - training_completion_rate
    confidential:
      - headcount_by_level
      - voluntary_attrition_count
      - avg_time_to_fill_days
      - leave_days_balance
    restricted:
      - ssn
      - individual_salary
      - performance_rating_individual
      - disciplinary_record
      - succession_candidate_flag
      - compensation_negotiation_note

privacy_rights:
  internal_only:
    - name: "Individual Performance Reviews"
      description: "Qualitative and quantitative assessments of individual employee performance conducted during review cycles"
      reason: "Individual performance data is strictly confidential under employment law and internal HR policy"
      blocks_topics: [performance review, performance rating, individual assessment, employee score, annual review]
    - name: "Disciplinary Records"
      description: "Records of formal warnings, performance improvement plans, investigations, and disciplinary proceedings"
      reason: "Disciplinary matters are legally sensitive and restricted to HR and the employee's direct chain"
      blocks_topics: [disciplinary, PIP, performance improvement plan, formal warning, misconduct, investigation]
    - name: "Compensation Negotiation"
      description: "Offer negotiation notes, salary banding discussions, counter-offer positions, and compensation benchmarking for individuals"
      reason: "Compensation negotiation details are commercially sensitive and could create pay equity disputes if disclosed"
      blocks_topics: [salary negotiation, offer negotiation, counter offer, compensation discussion, pay banding individual]
    - name: "Team Management Workflows"
      description: "Internal escalation paths, manager coaching notes, and team restructuring plans under consideration"
      reason: "Pre-decisional organisational changes must remain confidential until formally communicated"
      blocks_topics: [restructure, reorg, team change, manager coaching, escalation workflow, headcount reduction]
    - name: "Succession Planning"
      description: "Identification of high-potential employees and succession candidates for senior roles"
      reason: "Succession data is restricted to senior leadership and HR to prevent retention risk and bias"
      blocks_topics: [succession plan, high potential, successor, talent review, future leaders]
  respond_with_when_blocked:
    message: >
      "That information is managed internally by the HR team
       and is not available through this system."
    escalation_path: "Contact the CHRO directly."

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - department_name
      - fiscal_period
      - metric_type
      - cohort_filter
      - employment_level
      - comparison_basis
  schema:
    databases:
      hr_db:
        type: postgresql
        host_env: HR_DB_HOST
        port_env: HR_DB_PORT
        name_env: HR_DB_NAME
        user_env: HR_DB_USER
        pass_env: HR_DB_PASS
        ssl: true
        permitted_tables:
          headcount_summary:
            description: "Aggregated headcount figures by department, level, and period — no individual employee records"
            permitted_columns:
              - department_id
              - department_name
              - fiscal_quarter
              - headcount_total
              - headcount_by_level
              - headcount_by_function
              - period
            blocked_columns:
              - ssn
              - individual_salary
              - date_of_birth
              - personal_email
              - home_address
            row_limit: 300
          leave_summary:
            description: "Aggregated leave utilisation by department and leave type — no individual leave records"
            permitted_columns:
              - department_id
              - department_name
              - leave_type
              - fiscal_quarter
              - leave_days_taken
              - leave_days_balance
              - period
            blocked_columns:
              - medical_leave_reason
              - employee_id
              - personal_email
            row_limit: 300
          org_structure:
            description: "Organisational hierarchy showing reporting lines by department and level — manager names anonymised"
            permitted_columns:
              - department_id
              - department_name
              - parent_department_id
              - level
              - headcount_total
              - span_of_control_avg
            blocked_columns:
              - manager_name
              - manager_id
              - individual_salary
            row_limit: 200
          recruitment_pipeline:
            description: "Aggregated recruitment funnel metrics by role type, department, and period"
            permitted_columns:
              - department_id
              - department_name
              - open_roles_count
              - avg_time_to_fill_days
              - offer_acceptance_rate
              - pipeline_stage
              - fiscal_quarter
              - period
            blocked_columns:
              - candidate_name
              - candidate_email
              - recruiter_name
              - compensation_negotiation_note
            row_limit: 300
          training_completion:
            description: "Training and learning completion rates by department, programme, and period"
            permitted_columns:
              - department_id
              - department_name
              - programme_name
              - training_completion_rate
              - fiscal_quarter
              - period
            blocked_columns:
              - employee_id
              - individual_score
              - performance_rating_individual
            row_limit: 300
  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords: [DROP, TRUNCATE, INSERT, UPDATE, DELETE, EXEC, EXECUTE]
  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000
  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types: [pdf, docx, xlsx, txt, csv]
    accepted_topics:
      - HR policies
      - employee handbook
      - leave policies
      - recruitment guidelines
      - onboarding documentation
      - performance management framework
      - learning and development programmes
      - compensation philosophy
      - diversity equity and inclusion
      - organisational design
      - workforce planning
    rejected_topics:
      - financial statements
      - legal contracts
      - litigation documents
      - vendor agreements
      - engineering specifications
      - product roadmaps
  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query is directed at the Human Resources department of an enterprise
      organisation. The domain covers workforce analytics, headcount management,
      attrition and retention, leave management, recruitment and talent acquisition,
      learning and development, organisational structure, and people policies.
      All data is aggregated — no individual employee records are accessible.
      Responses must be sensitive to employment law obligations and HR confidentiality norms.
    expand_abbreviations: true
    abbreviations:
      FTE: Full-Time Equivalent
      HC: Headcount
      L&D: Learning and Development
      DEI: Diversity, Equity, and Inclusion
      HRBP: HR Business Partner
      PIP: Performance Improvement Plan
      OKR: Objectives and Key Results
      TTF: Time to Fill
      TTA: Time to Accept
      WFP: Workforce Planning
      IC: Individual Contributor
      YoY: Year-over-Year
      QoQ: Quarter-over-Quarter
  retriever:
    index_path: departments/hr/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 8
    use_hyde: false
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 384
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4
  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    The HR Agent is a people-focused assistant that leads with organisational
    context before presenting metrics. It is careful, empathetic, and rigorous
    about privacy — it never surfaces individual employee data and always frames
    workforce insights with appropriate trend and benchmark context. It escalates
    to the CHRO when queries touch sensitive or restricted people matters.
  confidence_threshold: 0.65
  escalates_to: cfo
  can_consult: [legal, finance]
  output:
    always_include:
      - period
      - cohort_description
      - metric_value
      - trend_direction
      - benchmark_reference
    format: executive_summary
    max_tokens: 800
