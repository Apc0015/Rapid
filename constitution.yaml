# ── Article 3: Department Boundaries ─────────────────────────────────────────
# Hard boundaries — Finance cannot query Legal tables and vice versa.
department_boundaries:
  finance:           [financials, orders, invoices, budget_allocations, expense_claims, accounts_receivable, cash_flow_statement, financial_close_log, tax_compliance, finance_kpis]
  legal:             [cases, contracts_db, compliance_records, regulatory_filings, legal_spend, ip_portfolio, regulatory_tracker, legal_kpis]
  hr:                [employees, benefits_enrollment, leave_records, org_structure, recruitment_pipeline, performance_reviews, succession_planning, dei_metrics, training_records, hr_kpis]
  sales:             [customers, deals, sales_pipeline, customer_interactions, sales_activities, quota_attainment, sales_forecast, sales_kpis]
  marketing:         [ad_spend, campaign_analytics, lead_data, channel_performance, email_campaigns, brand_sentiment, web_analytics, marketing_kpis]
  ops:               [operations, logistics, kpis, sla_records, vendor_contracts, production_metrics, inventory, quality_control, facility_metrics, ops_kpis]
  it:                [systems, access_requests, software_licenses, infrastructure_status, it_incidents, it_assets, security_events, change_requests, it_kpis]
  procurement:       [purchase_orders, suppliers, rfq_records, vendor_evaluations, spend_analytics, sourcing_events, supplier_contracts, procurement_kpis]
  rd:                [rd_projects, experiments, ip_registry, research_budgets, innovation_pipeline, rd_talent, rd_kpis]
  customer_success:  [cs_accounts, nps_scores, support_tickets, renewal_pipeline, churn_log, product_usage, onboarding_tracker, expansion_revenue, cs_kpis]

# ── Article 4: Aggregation Rules ──────────────────────────────────────────────
# Data that must always be aggregated — individual rows blocked.
aggregation_required:
  - table: employees
    column: salary
    method: team_average           # GROUP BY department → AVG(salary)
  - table: benefits_enrollment
    column: monthly_premium
    method: average
  - table: lead_data
    column: contact_email
    method: hash_email
  - table: customers
    column: contact_email
    method: hash_email
  - table: suppliers
    column: contact_email
    method: hash_email
  - table: performance_reviews
    column: overall_rating
    method: team_average
  - table: dei_metrics
    column: avg_pay
    method: group_average
  - table: churn_log
    column: feedback
    method: paraphrase
  - table: nps_scores
    column: verbatim
    method: paraphrase

# ── Article 5: Audit Requirements ─────────────────────────────────────────────
audit:
  retention_years: 7
  alert_on_block_rate_threshold: 0.20   # alert if >20% of queries trigger BLOCKs
  always_log:
    - query
    - governance_action
    - auth_failure
    - dept_boundary_violation
    - confidence_below_threshold

# ── Article 6: Agent Instructions ────────────────────────────────────────────
agent_instructions:
  prohibited_actions:
    - expose_raw_data
    - expose_column_names
    - expose_schema
    - generate_insert_update_delete
    - bypass_governance
  required_caveats:
    - salary_data_is_aggregated
    - blocked_data_not_shown
    - confidence_warning_below_065
  escalation_triggers:
    - auth_failure
    - security_exception
    - dept_boundary_violation
    - no_agent_confidence_above_050

# ── Article 7: Amendment Process ──────────────────────────────────────────────
amendment:
  requires: human_administrator_approval
  takes_effect: next_system_restart
  all_changes_are_audit_logged: true
