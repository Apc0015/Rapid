# ── Article 3: Department Boundaries ─────────────────────────────────────────
# Hard boundaries — Finance cannot query Legal tables and vice versa.
department_boundaries:
  finance:           [financials, orders, invoices, budget_allocations, expense_claims]
  legal:             [cases, contracts_db, compliance_records, regulatory_filings]
  hr:                [employees, benefits_enrollment, leave_records, org_structure]
  sales:             [customers, deals, sales_pipeline, customer_interactions]
  marketing:         [ad_spend, campaign_analytics, lead_data, channel_performance]
  ops:               [operations, logistics, kpis, sla_records, vendor_contracts]
  it:                [systems, access_requests, software_licenses, infrastructure_status]
  procurement:       [purchase_orders, suppliers, rfq_records, vendor_evaluations]
  rd:                [rd_projects, experiments, ip_registry, research_budgets]
  customer_success:  [cs_accounts, nps_scores, support_tickets, renewal_pipeline]

# ── Article 4: Aggregation Rules ──────────────────────────────────────────────
# Data that must always be aggregated — individual rows blocked.
aggregation_required:
  - table: employees
    column: salary
    method: team_average           # GROUP BY department → AVG(salary)
  - table: benefits_enrollment
    column: monthly_premium
    method: average
  - table: lead_data
    column: contact_email
    method: hash_email

# ── Article 5: Audit Requirements ─────────────────────────────────────────────
audit:
  retention_years: 7
  alert_on_block_rate_threshold: 0.20   # alert if >20% of queries trigger BLOCKs
  always_log:
    - query
    - governance_action
    - auth_failure
    - dept_boundary_violation
    - confidence_below_threshold

# ── Article 6: Agent Instructions ────────────────────────────────────────────
agent_instructions:
  prohibited_actions:
    - expose_raw_data
    - expose_column_names
    - expose_schema
    - generate_insert_update_delete
    - bypass_governance
  required_caveats:
    - salary_data_is_aggregated
    - blocked_data_not_shown
    - confidence_warning_below_065
  escalation_triggers:
    - auth_failure
    - security_exception
    - dept_boundary_violation
    - no_agent_confidence_above_050

# ── Article 7: Amendment Process ──────────────────────────────────────────────
amendment:
  requires: human_administrator_approval
  takes_effect: next_system_restart
  all_changes_are_audit_logged: true
