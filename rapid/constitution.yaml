# ══════════════════════════════════════════════════════════════════════════════
# RAPID — Company Constitution v1.0
# Supreme governance document. Loaded once at startup. No agent can override it.
# ══════════════════════════════════════════════════════════════════════════════

# ── Article 1: Access Control ─────────────────────────────────────────────────
# Which user roles can query which departments.
access_control:
  admin:
    departments: [finance, legal, hr, sales, marketing, ops, it, procurement, rd, customer_success]
    level: full
  manager:
    departments: [finance, legal, hr, sales, marketing, ops, it, procurement, rd, customer_success]
    level: manager
  employee:
    departments: [hr, it]
    level: standard
  sales_rep:
    departments: [sales, marketing, hr, it, customer_success]
    level: standard
  finance_analyst:
    departments: [finance, hr, it, procurement]
    level: standard
  legal_counsel:
    departments: [legal, hr, it]
    level: standard

