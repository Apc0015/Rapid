# deploy/nginx.conf — Production Nginx config for RAPID
#
# Place this file at /etc/nginx/sites-available/rapid
# then: ln -s /etc/nginx/sites-available/rapid /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx
#
# Requires:
#   - Certbot SSL certificate at /etc/letsencrypt/live/YOUR_DOMAIN/
#   - Gunicorn running on Unix socket /tmp/rapid.sock
#   - Replace YOUR_DOMAIN with your actual domain / IP

# ── Rate limiting zones ───────────────────────────────────────────────────────
# 10 MB state zone → ~160 000 IP addresses
limit_req_zone  $binary_remote_addr  zone=rapid_api:10m  rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=rapid_auth:10m rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # LetsEncrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (TLS 1.2 / 1.3) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS certificates (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate      /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # ── Request size limits ───────────────────────────────────────────────────
    client_max_body_size      50M;   # allow file uploads up to 50 MB
    client_body_timeout       30s;
    client_header_timeout     10s;
    send_timeout              60s;

    # ── Upstream — Gunicorn Unix socket ───────────────────────────────────────
    upstream rapid_backend {
        server unix:/tmp/rapid.sock fail_timeout=0;
        # For TCP: server 127.0.0.1:8000 fail_timeout=0;
    }

    # ── /health — public, no rate limit ──────────────────────────────────────
    location = /health {
        proxy_pass         http://rapid_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /auth — stricter rate limit (10 login attempts/min) ──────────────────
    location /auth/ {
        limit_req           zone=rapid_auth burst=5 nodelay;
        limit_req_status    429;

        proxy_pass          http://rapid_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
    }

    # ── /query — rate limited, long timeout ──────────────────────────────────
    location = /query {
        limit_req           zone=rapid_api burst=10 nodelay;
        limit_req_status    429;

        proxy_pass          http://rapid_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  135s;   # > 120s backend timeout
        proxy_send_timeout  135s;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location / {
        proxy_pass          http://rapid_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # WebSocket support (for future streaming endpoints)
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
    }

    # ── Hide Nginx version from error pages ───────────────────────────────────
    server_tokens off;

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"detail":"Too many requests — please slow down"}';
        add_header Content-Type application/json;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 503 '{"detail":"Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}
