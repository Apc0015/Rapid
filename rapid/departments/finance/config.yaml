department:
  id: finance
  display_name: Finance
  reports_to: cfo
  active: true

skills:
  generate_reports:
    - id: pnl_report
      name: Profit & Loss Report
      trigger_phrases: ["p&l", "profit and loss", "income statement", "revenue vs cost", "net income"]
      output_format: structured_table
    - id: budget_variance_report
      name: Budget Variance Report
      trigger_phrases: ["budget variance", "actual vs budget", "budget deviation", "over budget", "under budget"]
      output_format: table_with_chart_data
    - id: forecast_summary_report
      name: Forecast Summary
      trigger_phrases: ["forecast", "financial forecast", "quarterly forecast", "revenue forecast", "outlook"]
      output_format: narrative_with_numbers
    - id: cash_flow_report
      name: Cash Flow Report
      trigger_phrases: ["cash flow", "liquidity", "cash position", "operating cash", "free cash flow"]
      output_format: structured_table
    - id: cost_centre_analysis_report
      name: Cost Centre Analysis
      trigger_phrases: ["cost centre", "cost center", "department spend", "opex by team", "cost allocation"]
      output_format: table_with_chart_data
  calculations:
    - id: roi_calculation
      name: ROI Calculator
      trigger_phrases: ["roi", "return on investment", "investment return", "payback period"]
    - id: burn_rate_calculation
      name: Burn Rate Calculator
      trigger_phrases: ["burn rate", "monthly burn", "runway", "cash burn", "spending rate"]
    - id: payroll_cost_per_head
      name: Payroll Cost Per Head
      trigger_phrases: ["cost per head", "payroll per employee", "average salary cost", "headcount cost"]
  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    always_show_variance: true
    always_show_yoy: true
    always_show_trend: true
    variance_format: "absolute and percentage"
    currency_default: USD
    decimal_places_currency: 2
    decimal_places_percentage: 1
    fiscal_year_start: "April"
    require_period_label: true
    flag_anomalies_above_pct: 10
  reply_style:
    format: numbers_first
    structure:
      - Lead with the key financial figure or metric
      - Show variance vs target (absolute + percentage)
      - Show year-over-year comparison
      - Show trend direction (up/down/stable) with period context
      - Close with one-line implication or flag if action is needed
    example: >
      Revenue for Q2 FY2025: $4.2M (+8.3% vs budget, +12.1% YoY). Variance driven
      by outperformance in enterprise segment (+$420K). Trend: three consecutive
      quarters of growth. Operating margin held at 22% — in line with plan.
  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Finance Agent"
      classification: "CONFIDENTIAL — Finance Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - revenue
      - cost_of_goods_sold
      - gross_profit
      - operating_expenses
      - ebitda
      - net_income
      - budget_amount
      - actual_amount
      - forecast_amount
      - variance_amount
      - variance_pct
      - period
      - fiscal_year
      - fiscal_quarter
      - cost_centre_code
      - cost_centre_name
      - department_id
      - invoice_count
      - invoice_total
      - headcount_count
    anonymize:
      - vendor_name
      - vendor_id
      - approver_name
      - approver_id
      - employee_id_payroll
    block:
      - negotiated_rate
      - vendor_contract_value
      - approval_threshold
      - board_pack_line_item
      - pre_announcement_revenue
      - executive_compensation_individual
      - internal_target_undisclosed
  aggregation_rules:
    min_group_size: 5
    always_aggregate:
      - payroll_cost
      - individual_expense_claim
      - bonus_amount
  sensitivity_levels:
    internal:
      - budget_amount
      - forecast_amount
      - variance_pct
      - cost_centre_name
    confidential:
      - ebitda
      - net_income
      - gross_profit
      - vendor_name
    restricted:
      - pre_announcement_revenue
      - board_pack_line_item
      - negotiated_rate
      - executive_compensation_individual

privacy_rights:
  internal_only:
    - name: "Vendor Negotiation Positions"
      description: "Pricing floors, discount thresholds, and strategic negotiation stances with vendors and suppliers"
      reason: "Disclosure would materially harm the company's commercial negotiating leverage"
      blocks_topics: [vendor pricing, negotiation, supplier discount, contract rate, preferred pricing]
    - name: "Pre-Announcement Financials"
      description: "Revenue, profit, or earnings figures not yet publicly disclosed"
      reason: "Material non-public information subject to securities regulations"
      blocks_topics: [unreleased results, pre-announcement, earnings preview, undisclosed revenue]
    - name: "Board Pack Details"
      description: "Financial projections, sensitivities, and commentary prepared for board review"
      reason: "Board materials are privileged and intended solely for director consumption"
      blocks_topics: [board pack, board presentation, director briefing, board financials]
    - name: "Internal Approval Thresholds"
      description: "Dollar limits that trigger escalation or senior approval in procurement and expenses"
      reason: "Knowledge of thresholds could be exploited to circumvent internal controls"
      blocks_topics: [approval limit, signing authority, escalation threshold, spend limit]
  respond_with_when_blocked:
    message: >
      "That information is managed internally by the Finance team
       and is not available through this system."
    escalation_path: "Contact the CFO directly."

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - fiscal_period
      - cost_centre
      - metric_type
      - comparison_basis
      - currency
      - date_range
  schema:
    databases:
      finance_db:
        type: postgresql
        host_env: FINANCE_DB_HOST
        port_env: FINANCE_DB_PORT
        name_env: FINANCE_DB_NAME
        user_env: FINANCE_DB_USER
        pass_env: FINANCE_DB_PASS
        ssl: true
        permitted_tables:
          budgets:
            description: "Annual and quarterly budget allocations by cost centre and category"
            permitted_columns:
              - cost_centre_code
              - cost_centre_name
              - fiscal_year
              - fiscal_quarter
              - budget_amount
              - category
              - department_id
            blocked_columns:
              - approval_threshold
              - internal_target_undisclosed
              - board_pack_line_item
            row_limit: 500
          actuals:
            description: "Recorded financial actuals by period, cost centre, and category"
            permitted_columns:
              - cost_centre_code
              - fiscal_year
              - fiscal_quarter
              - period
              - actual_amount
              - category
              - department_id
              - invoice_count
            blocked_columns:
              - vendor_id
              - vendor_name
              - negotiated_rate
            row_limit: 500
          forecasts:
            description: "Forward-looking financial forecasts by period and cost centre"
            permitted_columns:
              - cost_centre_code
              - fiscal_year
              - fiscal_quarter
              - forecast_amount
              - category
              - confidence_level
              - department_id
            blocked_columns:
              - pre_announcement_revenue
              - board_pack_line_item
            row_limit: 200
          invoice_summaries:
            description: "Aggregated invoice data by period, category, and department — no individual vendor detail"
            permitted_columns:
              - department_id
              - category
              - fiscal_quarter
              - invoice_count
              - invoice_total
              - period
            blocked_columns:
              - vendor_name
              - vendor_id
              - negotiated_rate
              - vendor_contract_value
            row_limit: 300
          payroll_cost_aggregates:
            description: "Aggregated payroll cost figures by department and period — no individual employee data"
            permitted_columns:
              - department_id
              - fiscal_quarter
              - headcount_count
              - total_payroll_cost
              - avg_cost_per_head
              - period
            blocked_columns:
              - employee_id_payroll
              - individual_salary
              - bonus_amount
            row_limit: 200
          cost_centres:
            description: "Cost centre master data including hierarchy and ownership"
            permitted_columns:
              - cost_centre_code
              - cost_centre_name
              - parent_cost_centre
              - department_id
              - owner_name
              - active
            blocked_columns: []
            row_limit: 200
  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords: [DROP, TRUNCATE, INSERT, UPDATE, DELETE, EXEC, EXECUTE]
  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000
  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types: [pdf, docx, xlsx, txt, csv]
    accepted_topics:
      - financial statements
      - budget reports
      - audit reports
      - expense policies
      - procurement policies
      - cost centre guidelines
      - forecast methodology
      - tax filings
      - financial controls
      - treasury policy
    rejected_topics:
      - employee performance reviews
      - HR policies
      - legal contracts
      - litigation documents
      - engineering specs
      - product roadmaps
  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query is directed at the Finance department of an enterprise organisation.
      The domain covers financial reporting, budgeting, forecasting, cost management,
      payroll cost aggregates, invoice processing, and financial controls. Queries are
      likely to involve specific fiscal periods, cost centres, variance analysis, and
      KPI comparisons such as YoY growth or budget adherence.
    expand_abbreviations: true
    abbreviations:
      P&L: Profit and Loss Statement
      EBITDA: Earnings Before Interest, Taxes, Depreciation, and Amortisation
      COGS: Cost of Goods Sold
      OPEX: Operating Expenditure
      CAPEX: Capital Expenditure
      YoY: Year-over-Year
      QoQ: Quarter-over-Quarter
      FY: Fiscal Year
      Q1: First Quarter
      Q2: Second Quarter
      Q3: Third Quarter
      Q4: Fourth Quarter
      ROI: Return on Investment
      FCF: Free Cash Flow
      AP: Accounts Payable
      AR: Accounts Receivable
  retriever:
    index_path: departments/finance/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 8
    use_hyde: false
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4
  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    The Finance Agent is a precise, numbers-driven assistant that prioritises
    accuracy and auditability in every response. It always leads with the key
    figure, shows variance and trend context, and flags anomalies that may
    require CFO attention. It does not speculate — if data is unavailable, it
    says so clearly.
  confidence_threshold: 0.65
  escalates_to: cfo
  can_consult: [legal, procurement]
  output:
    always_include:
      - period
      - metric_value
      - variance_vs_budget
      - yoy_comparison
      - trend_direction
    format: executive_summary
    max_tokens: 800
