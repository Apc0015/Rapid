department:
  id: rd
  display_name: Research and Development
  reports_to: cto
  active: true

skills:
  generate_reports:
    - id: project_pipeline_status
      name: Project Pipeline Status Report
      trigger_phrases:
        - "project pipeline"
        - "R&D project status"
        - "what projects are active"
        - "research pipeline"
        - "project health"
        - "milestone status"
      output_format: pipeline_board

    - id: patent_portfolio_summary
      name: Patent Portfolio Summary
      trigger_phrases:
        - "patent portfolio"
        - "patents filed"
        - "IP summary"
        - "how many patents"
        - "patent status"
        - "intellectual property summary"
      output_format: table_with_summary

    - id: experiment_results_summary
      name: Experiment Results Summary
      trigger_phrases:
        - "experiment results"
        - "lab results summary"
        - "experiment outcomes"
        - "research results"
        - "experiment log"
      output_format: structured_summary

    - id: innovation_metrics
      name: Innovation Metrics Report
      trigger_phrases:
        - "innovation metrics"
        - "innovation pipeline"
        - "ideas in pipeline"
        - "time to prototype"
        - "innovation KPIs"
      output_format: metric_cards

    - id: research_budget_utilization
      name: Research Budget Utilization Report
      trigger_phrases:
        - "R&D budget"
        - "research budget utilization"
        - "budget vs actuals R&D"
        - "how much budget is left"
        - "project spend"
      output_format: budget_dashboard

  calculations:
    - id: project_health_index
      name: Project Health Index
      trigger_phrases:
        - "project health score"
        - "project health index"
        - "which projects are at risk"
        - "on-track vs delayed"

    - id: budget_utilization_pct
      name: Budget Utilization Percentage
      trigger_phrases:
        - "budget utilization"
        - "how much of R&D budget used"
        - "burn rate research"
        - "budget remaining"

    - id: patent_velocity
      name: Patent Filing Velocity
      trigger_phrases:
        - "patent velocity"
        - "patents per quarter"
        - "patent filing rate"
        - "IP output rate"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    innovation_first: true
    lead_with_milestone: "Always open with the most recent major milestone or discovery before financial or operational data."
    show_project_health: true
    show_timeline_vs_plan: true
    flag_delayed_projects: true
    delay_threshold_days: 14
    flag_budget_overrun_threshold_pct: 15
    never_expose_unpatented_ip: true
    never_expose_unpublished_research: true
    never_expose_competitive_intelligence: true
    never_expose_failed_experiment_details_strategic: true
    include_trend_comparison: true
    trend_period_days: 90

  reply_style:
    format: structured_report
    structure:
      - latest_milestone_or_discovery
      - project_health_summary
      - timeline_vs_plan
      - budget_utilization
      - patents_filed
      - recommended_actions
    example: >
      LATEST MILESTONE: Project Helios completed Phase 2 validation — 3 days ahead of plan.
      PROJECT HEALTH: 7 active projects — 5 on track, 1 at risk (Nova: 18 days delayed), 1 on hold.
      BUDGET: 68% of R&D annual budget utilized. 2 projects showing >15% overrun.
      PATENTS: 4 patents filed this quarter. 2 pending grant. Total portfolio: 47 active.
      ACTION REQUIRED: Nova project delay requires escalation and revised timeline.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "R&D Agent"
      classification: "CONFIDENTIAL — R&D Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - project_id
      - project_name
      - project_status
      - project_phase
      - project_lead_team
      - start_date
      - target_completion
      - actual_completion
      - milestone_name
      - milestone_status
      - milestone_date
      - patent_id
      - patent_title
      - patent_status
      - filing_date
      - grant_date
      - jurisdiction
      - experiment_id
      - experiment_name
      - experiment_status
      - outcome_category
      - budget_allocated
      - budget_spent
      - budget_remaining
      - utilization_pct
      - innovation_stage
      - ideas_submitted
      - ideas_in_prototype
      - ideas_launched
    anonymize:
      - lead_researcher_name
      - experiment_operator
      - project_sponsor_name
    block:
      - unpatented_invention_detail
      - unpublished_research_data
      - competitive_analysis_raw
      - experiment_proprietary_formula
      - rd_roadmap_confidential
      - failed_experiment_strategic_detail
      - competitive_intelligence_raw
      - patent_draft_pre_filing

  aggregation_rules:
    min_group_size: 2
    always_aggregate:
      - experiment_outcomes_by_type
      - budget_by_project_phase
      - patent_filings_by_quarter

  sensitivity_levels:
    internal:
      - project_name
      - milestone_name
      - experiment_name
      - budget_allocated
    confidential:
      - patent_title
      - patent_status
      - project_phase
      - budget_spent
      - outcome_category
    restricted:
      - unpatented_invention_detail
      - unpublished_research_data
      - experiment_proprietary_formula
      - rd_roadmap_confidential
      - competitive_analysis_raw

privacy_rights:
  internal_only:
    - name: unpatented_inventions
      description: Invention disclosures and technical details for innovations not yet filed for patent protection.
      reason: Premature disclosure places inventions into public domain, destroying patent eligibility and IP value.
      blocks_topics:
        - "unpatented invention"
        - "new invention details"
        - "pre-patent disclosure"
        - "invention submission"

    - name: unpublished_research
      description: Research data, experiment results, and findings not yet through peer review or internal publication approval.
      reason: Early disclosure can compromise academic publication rights and competitive advantage.
      blocks_topics:
        - "unpublished results"
        - "latest experiment data"
        - "pre-publication findings"
        - "raw research output"

    - name: competitive_intelligence
      description: Competitive analyses, market intelligence, and technology benchmarking gathered through research activities.
      reason: Disclosure of competitive intelligence could alert competitors to strategic positioning and research focus areas.
      blocks_topics:
        - "competitor research"
        - "competitive analysis"
        - "what is competitor doing"
        - "market intelligence"

    - name: failed_experiment_strategic_details
      description: Detailed outcomes of experiments abandoned for strategic reasons (pivots, market changes, legal risk).
      reason: Failed experiment details can reveal strategic intent and resource allocation decisions to competitors.
      blocks_topics:
        - "why did we stop"
        - "cancelled experiment details"
        - "abandoned project reasons"
        - "failed research details"

    - name: rd_roadmap
      description: Multi-year R&D roadmap including project pipeline sequencing, technology bets, and investment areas.
      reason: Roadmap disclosure enables competitors to anticipate product development timelines and IP filing strategies.
      blocks_topics:
        - "R&D roadmap"
        - "what are we building next"
        - "research pipeline 3 year"
        - "future technology bets"

  respond_with_when_blocked:
    message: >
      This information is subject to R&D Intellectual Property Protection Policy and
      cannot be disclosed through this channel. Please contact the Chief Technology
      Officer or the IP Legal team for access requests. All unpatented invention details
      and unpublished research must be handled through secure IP channels only.
    escalation_path: cto_office

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - project_name
      - project_phase
      - time_range
      - report_type
      - metric_requested
      - patent_jurisdiction

  schema:
    databases:
      rd_db:
        type: postgresql
        host_env: RD_DB_HOST
        port_env: RD_DB_PORT
        name_env: RD_DB_NAME
        user_env: RD_DB_USER
        pass_env: RD_DB_PASS
        ssl: true
        permitted_tables:
          research_projects:
            description: Active and historical research project records with phase, status, and timeline. Roadmap and pre-patent details excluded.
            permitted_columns:
              - project_id
              - project_name
              - project_status
              - project_phase
              - project_lead_team
              - start_date
              - target_completion
              - actual_completion
              - days_ahead_or_behind
              - health_indicator
            blocked_columns:
              - roadmap_priority_raw
              - strategic_rationale_confidential
              - lead_researcher_email
            row_limit: 200

          patent_registry:
            description: Patent portfolio with filing status, jurisdiction, and grant dates. Draft and pre-filing details excluded.
            permitted_columns:
              - patent_id
              - patent_title
              - patent_status
              - filing_date
              - grant_date
              - jurisdiction
              - technology_area
              - project_id_linked
            blocked_columns:
              - patent_draft_text
              - invention_disclosure_raw
              - inventors_personal_detail
            row_limit: 300

          experiment_log_summary:
            description: Summarized experiment outcomes by category. Raw data, formulas, and strategic failure details excluded.
            permitted_columns:
              - experiment_id
              - experiment_name
              - experiment_status
              - outcome_category
              - project_id_linked
              - start_date
              - end_date
            blocked_columns:
              - raw_data_output
              - proprietary_formula
              - failure_strategic_reason
              - researcher_notes_raw
            row_limit: 300

          innovation_pipeline:
            description: Innovation funnel metrics from idea submission through prototype and launch stages.
            permitted_columns:
              - innovation_stage
              - period
              - ideas_submitted
              - ideas_in_evaluation
              - ideas_in_prototype
              - ideas_launched
              - avg_time_to_prototype_days
            blocked_columns: []
            row_limit: 100

          rd_budget_utilization:
            description: R&D budget allocation and spend by project and period.
            permitted_columns:
              - project_id
              - project_name
              - budget_allocated
              - budget_spent
              - budget_remaining
              - utilization_pct
              - period
              - overrun_flag
            blocked_columns:
              - vendor_contract_rates
              - researcher_compensation
            row_limit: 200

          technical_debt_log:
            description: Aggregated technical debt items by project with severity and estimated resolution effort.
            permitted_columns:
              - project_id
              - project_name
              - debt_category
              - severity
              - item_count
              - estimated_effort_days
              - period
            blocked_columns:
              - system_component_detail
              - codebase_path_raw
            row_limit: 200

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - research methodology
      - project management
      - patent documentation
      - experiment design
      - technical specifications
      - innovation frameworks
      - R&D governance
      - technology assessment
      - literature review summaries
      - research budget
      - milestone reporting
    rejected_topics:
      - unpatented invention disclosures
      - pre-publication raw data
      - competitor intelligence reports
      - proprietary formulas
      - strategic roadmaps confidential
      - failed experiment root cause strategic

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This is a Research and Development department context. Documents use scientific
      and technical terminology across disciplines including materials science, software
      engineering, machine learning, and product development. Common frameworks include
      stage-gate processes, design thinking, agile research sprints, and technology
      readiness levels (TRL 1-9). Documents may use discipline-specific jargon,
      experimental notation, and statistical terminology. Expand abbreviations and
      map technical terms to their standard research and development meanings.
      Note: this corpus uses varied and domain-specific language — apply semantic
      expansion to surface conceptually related content.
    expand_abbreviations: true
    abbreviations:
      TRL: Technology Readiness Level
      IP: Intellectual Property
      R&D: Research and Development
      POC: Proof of Concept
      MVP: Minimum Viable Product
      NDA: Non-Disclosure Agreement
      SOW: Statement of Work
      KPI: Key Performance Indicator
      OKR: Objective and Key Result
      IRB: Institutional Review Board
      DoE: Design of Experiments
      FMEA: Failure Mode and Effects Analysis

  retriever:
    index_path: departments/rd/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 6
    use_hyde: true
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 1024
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    You are the RAPID R&D Agent. You assist Research and Development teams by surfacing
    project health, milestone progress, patent portfolio status, innovation pipeline
    metrics, and budget utilization. You always lead with the most recent significant
    milestone or discovery. You never expose unpatented invention details, unpublished
    research data, proprietary experimental formulas, competitive intelligence, or the
    confidential R&D roadmap. You escalate IP-sensitive queries immediately to the CTO office.
  confidence_threshold: 0.65
  escalates_to: cto_office
  can_consult:
    - it
    - marketing
    - sales
  output:
    always_include:
      - project_health
      - milestone_status
      - budget_utilization
      - patents_filed
    format: executive_summary
    max_tokens: 800
