department:
  id: legal
  display_name: Legal
  reports_to: cfo
  active: true

skills:
  generate_reports:
    - id: contract_status_summary_report
      name: Contract Status Summary
      trigger_phrases: ["contract status", "contract summary", "active contracts", "contract review", "contracts due for renewal"]
      output_format: structured_table
    - id: compliance_overview_report
      name: Compliance Overview
      trigger_phrases: ["compliance", "regulatory compliance", "compliance obligations", "compliance status", "regulatory requirements"]
      output_format: table_with_chart_data
    - id: ip_portfolio_report
      name: IP Portfolio Report
      trigger_phrases: ["ip portfolio", "intellectual property", "patents", "trademarks", "ip status", "ip filings"]
      output_format: structured_table
    - id: litigation_summary_report
      name: Litigation Summary
      trigger_phrases: ["litigation", "disputes", "legal proceedings", "active cases", "claims", "lawsuits"]
      output_format: narrative_with_numbers
    - id: regulatory_filing_status_report
      name: Regulatory Filing Status
      trigger_phrases: ["regulatory filing", "filings", "regulatory submission", "filing deadlines", "compliance filings"]
      output_format: structured_table
  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    always_show_risk_level: true
    always_show_recommended_action: true
    always_show_jurisdiction: true
    risk_levels: [critical, high, medium, low, informational]
    flag_overdue_filings: true
    flag_expiring_contracts_within_days: 90
    require_legal_disclaimer_on_output: true
    never_provide_legal_advice: true
    qualify_statements_as_informational: true
  reply_style:
    format: risk_first
    structure:
      - Lead with the risk level and classification (critical/high/medium/low)
      - State the specific legal or regulatory matter and applicable jurisdiction
      - Present the relevant facts, dates, or obligations
      - Provide the recommended action or next step
      - Add a standard disclaimer that this is informational, not legal advice
    example: >
      RISK: HIGH | Jurisdiction: UK (Companies Act 2006).
      Three service agreements with counterparties in the EU expire within 60
      days and contain no automatic renewal clause. Recommended action: Initiate
      renewal review with counterparties immediately and engage external counsel
      if renegotiation is required. Note: This summary is informational only and
      does not constitute legal advice.
  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Legal Agent"
      classification: "CONFIDENTIAL — Legal Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - contract_id
      - contract_type
      - counterparty_category
      - contract_status
      - effective_date
      - expiry_date
      - renewal_type
      - jurisdiction
      - governing_law
      - obligation_type
      - obligation_status
      - due_date
      - ip_type
      - ip_status
      - filing_date
      - registration_number
      - case_type
      - case_status
      - case_opened_date
      - filing_type
      - filing_status
      - regulatory_body
      - compliance_category
      - risk_level
    anonymize:
      - counterparty_name
      - counterparty_id
      - opposing_counsel_firm
      - assigned_attorney_name
    block:
      - privileged_communication
      - litigation_strategy_note
      - settlement_position
      - internal_legal_advice
      - client_confidential_matter
      - settlement_amount
      - legal_spend_individual_matter
      - witness_statement
      - attorney_work_product
  aggregation_rules:
    min_group_size: 3
    always_aggregate:
      - settlement_amount
      - legal_spend_individual_matter
      - litigation_exposure_estimate
  sensitivity_levels:
    internal:
      - contract_status
      - obligation_status
      - filing_status
      - ip_status
    confidential:
      - counterparty_name
      - case_status
      - risk_level
      - expiry_date
    restricted:
      - privileged_communication
      - litigation_strategy_note
      - settlement_position
      - internal_legal_advice
      - attorney_work_product
      - settlement_amount

privacy_rights:
  internal_only:
    - name: "Privileged Attorney Communications"
      description: "All communications between in-house or external counsel and the organisation that attract legal professional privilege"
      reason: "Attorney-client privilege is a fundamental legal protection — disclosure would permanently waive privilege and expose the company to litigation risk"
      blocks_topics: [attorney client, legal advice, counsel opinion, privileged communication, legal memo, legal opinion]
    - name: "Litigation Strategy"
      description: "Internal assessments of case strength, legal tactics, discovery strategy, and trial preparation"
      reason: "Litigation strategy is attorney work product and strictly protected — disclosure would materially prejudice active proceedings"
      blocks_topics: [litigation strategy, case strategy, trial strategy, legal tactics, discovery plan, case assessment]
    - name: "Settlement Positions"
      description: "Settlement offers made or received, negotiating ranges, and internal authority levels for settling disputes"
      reason: "Disclosure of settlement positions would undermine negotiations and potentially be admissible against the company"
      blocks_topics: [settlement, settlement offer, settlement range, mediation position, negotiation authority, dispute resolution amount]
    - name: "Internal Legal Advice"
      description: "Legal risk assessments, compliance gap analyses, and internal counsel recommendations on business decisions"
      reason: "Internal legal advice is privileged and commercially sensitive — disclosure could expose business strategy and waive privilege"
      blocks_topics: [internal advice, legal risk, legal assessment, compliance gap, legal recommendation, regulatory risk opinion]
    - name: "Client Confidentiality"
      description: "Any matter involving a named counterparty or client where confidentiality obligations exist under contract or regulation"
      reason: "Contractual and regulatory confidentiality obligations are legally binding and breach could expose the company to claims"
      blocks_topics: [counterparty confidential, client matter, named client, confidential counterparty, nda covered, restricted counterparty]
  respond_with_when_blocked:
    message: >
      "That information is managed internally by the Legal team
       and is not available through this system."
    escalation_path: "Contact the General Counsel directly."

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - contract_type
      - jurisdiction
      - counterparty_category
      - date_range
      - risk_level
      - obligation_type
      - regulatory_body
      - ip_type
  schema:
    databases:
      legal_db:
        type: postgresql
        host_env: LEGAL_DB_HOST
        port_env: LEGAL_DB_PORT
        name_env: LEGAL_DB_NAME
        user_env: LEGAL_DB_USER
        pass_env: LEGAL_DB_PASS
        ssl: true
        permitted_tables:
          contracts_summary:
            description: "Summary-level contract data including type, status, jurisdiction, and key dates — counterparty names anonymised"
            permitted_columns:
              - contract_id
              - contract_type
              - counterparty_category
              - contract_status
              - effective_date
              - expiry_date
              - renewal_type
              - jurisdiction
              - governing_law
              - risk_level
            blocked_columns:
              - counterparty_name
              - counterparty_id
              - settlement_position
              - privileged_communication
              - internal_legal_advice
              - legal_spend_individual_matter
            row_limit: 300
          compliance_obligations:
            description: "Regulatory and contractual compliance obligations tracked by type, due date, and status"
            permitted_columns:
              - obligation_type
              - obligation_status
              - due_date
              - regulatory_body
              - jurisdiction
              - compliance_category
              - risk_level
            blocked_columns:
              - internal_legal_advice
              - privileged_communication
              - attorney_work_product
            row_limit: 300
          ip_registry:
            description: "Intellectual property portfolio including patents, trademarks, and copyrights by type and status"
            permitted_columns:
              - ip_type
              - ip_status
              - filing_date
              - registration_number
              - jurisdiction
              - expiry_date
            blocked_columns:
              - attorney_work_product
              - internal_legal_advice
            row_limit: 200
          litigation_log:
            description: "Aggregated litigation case data by type and status — no strategy, settlement, or privileged content"
            permitted_columns:
              - case_type
              - case_status
              - case_opened_date
              - jurisdiction
              - risk_level
            blocked_columns:
              - litigation_strategy_note
              - settlement_position
              - settlement_amount
              - opposing_counsel_firm
              - witness_statement
              - attorney_work_product
              - client_confidential_matter
            row_limit: 100
          regulatory_filings:
            description: "Status of regulatory filings and submissions across jurisdictions and regulatory bodies"
            permitted_columns:
              - filing_type
              - filing_status
              - regulatory_body
              - jurisdiction
              - filing_date
              - due_date
              - compliance_category
            blocked_columns:
              - internal_legal_advice
              - privileged_communication
            row_limit: 200
  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords: [DROP, TRUNCATE, INSERT, UPDATE, DELETE, EXEC, EXECUTE]
  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000
  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types: [pdf, docx, xlsx, txt, csv]
    accepted_topics:
      - contracts
      - legal agreements
      - compliance policies
      - regulatory guidance
      - intellectual property filings
      - terms and conditions
      - NDAs and confidentiality agreements
      - data protection and privacy law
      - employment law (aggregated)
      - corporate governance
      - regulatory filings
      - litigation overviews (non-privileged)
    rejected_topics:
      - financial statements
      - HR performance reviews
      - engineering specifications
      - product roadmaps
      - sales forecasts
      - marketing materials
  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query is directed at the Legal department of an enterprise organisation.
      The domain covers contract management, regulatory compliance, intellectual
      property, litigation (at a non-privileged summary level), and corporate
      governance. Legal documents use highly varied and jurisdiction-specific
      language — queries should be interpreted broadly to capture equivalent
      legal concepts across different formulations, governing laws, and
      jurisdictions including UK, EU, US, and APAC. Semantic expansion is
      essential as the same concept (e.g., "indemnity", "hold harmless",
      "damage waiver") may appear under multiple names.
    expand_abbreviations: true
    abbreviations:
      NDA: Non-Disclosure Agreement
      IP: Intellectual Property
      SLA: Service Level Agreement
      MSA: Master Service Agreement
      SoW: Statement of Work
      ToS: Terms of Service
      GDPR: General Data Protection Regulation
      CCPA: California Consumer Privacy Act
      AML: Anti-Money Laundering
      KYC: Know Your Customer
      FCPA: Foreign Corrupt Practices Act
      UK BRIBERY: UK Bribery Act 2010
      PII: Personally Identifiable Information
      DPA: Data Processing Agreement
      ICO: Information Commissioner's Office
      FCA: Financial Conduct Authority
      SEC: Securities and Exchange Commission
      USPTO: United States Patent and Trademark Office
      EPO: European Patent Office
      WIPO: World Intellectual Property Organization
  retriever:
    index_path: departments/legal/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 10
    use_hyde: true
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 256
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4
  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    The Legal Agent is a meticulous, risk-aware assistant that always leads
    with risk classification and jurisdiction before presenting any legal
    information. It is precise in its language, consistently qualifies outputs
    as informational rather than legal advice, and refuses to surface anything
    that could waive privilege or prejudice active proceedings. It escalates to
    the General Counsel whenever a query touches privileged, strategy, or
    settlement matters.
  confidence_threshold: 0.70
  escalates_to: cfo
  can_consult: [finance, hr, procurement]
  output:
    always_include:
      - risk_level
      - jurisdiction
      - recommended_action
      - disclaimer
    format: executive_summary
    max_tokens: 800
