department:
  id: marketing
  display_name: Marketing
  reports_to: coo
  active: true

# ─────────────────────────────────────────────
# SKILLS
# ─────────────────────────────────────────────
skills:
  generate_reports:
    - id: campaign_performance
      name: Campaign Performance Report
      trigger_phrases:
        - "campaign performance"
        - "how did the campaign do"
        - "campaign results"
        - "campaign ROI"
        - "show me campaign metrics"
      output_format: table_with_summary

    - id: lead_generation_summary
      name: Lead Generation Summary
      trigger_phrases:
        - "lead generation"
        - "how many leads did we generate"
        - "leads this month"
        - "lead volume"
        - "MQL summary"
      output_format: trend_chart_data

    - id: brand_health
      name: Brand Health Report
      trigger_phrases:
        - "brand health"
        - "brand sentiment"
        - "share of voice"
        - "brand awareness score"
        - "brand perception"
      output_format: scorecard

    - id: content_performance
      name: Content Performance Report
      trigger_phrases:
        - "content performance"
        - "which content is performing"
        - "top performing assets"
        - "content engagement"
        - "blog performance"
      output_format: ranked_table

    - id: event_roi
      name: Event ROI Report
      trigger_phrases:
        - "event ROI"
        - "event performance"
        - "trade show results"
        - "webinar performance"
        - "how did the event do"
      output_format: comparison_table

  calculations:
    - id: cac
      name: Customer Acquisition Cost (CAC)
      trigger_phrases:
        - "CAC"
        - "customer acquisition cost"
        - "cost to acquire a customer"
        - "what does it cost us to acquire a customer"

    - id: cpl
      name: Cost Per Lead (CPL)
      trigger_phrases:
        - "CPL"
        - "cost per lead"
        - "how much does each lead cost"
        - "lead cost"

    - id: conversion_rate
      name: Conversion Rate Calculator
      trigger_phrases:
        - "conversion rate"
        - "lead to opportunity conversion"
        - "MQL to SQL rate"
        - "funnel conversion"
        - "what percentage of leads convert"

    - id: roas
      name: Return on Ad Spend (ROAS)
      trigger_phrases:
        - "ROAS"
        - "return on ad spend"
        - "advertising ROI"
        - "paid campaign return"
        - "what did we get back on ad spend"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

# ─────────────────────────────────────────────
# POLICY
# ─────────────────────────────────────────────
policy:
  working_rules:
    impact_first: true                         # Always lead with the business impact of the campaign
    always_show_roi: true                      # ROI must appear in every campaign response
    always_show_benchmark_comparison: true     # Compare against industry or internal benchmark
    default_period: current_month
    currency: USD
    include_pipeline_contribution: true        # Show marketing's contribution to sales pipeline
    flag_campaigns_below_benchmark: true
    benchmark_source: internal_prior_period
    ab_test_results_embargo: true              # A/B test results suppressed until test concludes

  reply_style:
    format: executive_summary
    structure:
      - headline_impact              # Business impact statement: pipeline sourced, revenue influenced
      - roi_vs_benchmark             # ROI for the period vs. internal benchmark
      - leads_generated              # Total leads, MQLs, cost per lead
      - top_performing_channels      # Top 2–3 channels by ROI or lead volume
      - underperformers_and_risks    # Campaigns below benchmark; budget at risk
      - recommended_actions          # Concise next steps (max 3 bullets)
    example: >
      Q2 marketing campaigns sourced $3.4M in pipeline (42% of total pipeline) and influenced
      $5.1M. Blended campaign ROI is 3.8x, above the 3.2x internal benchmark. Email nurture
      drove 412 MQLs at $48 CPL — best performer this quarter. Paid search ROAS has declined
      to 2.1x (below benchmark); budget reallocation recommended. Recommended: (1) Shift 15%
      of paid search budget to LinkedIn ABM, (2) Accelerate Q3 webinar series, (3) Review
      brand health scores ahead of product launch.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Marketing Agent"
      classification: "CONFIDENTIAL — Marketing Only"
      footer: "Generated by RAPID. Verify with source system."

# ─────────────────────────────────────────────
# DEPT GOVERNANCE
# ─────────────────────────────────────────────
dept_governance:
  column_rules:
    allow:
      - campaign_id
      - campaign_name
      - campaign_type
      - channel
      - start_date
      - end_date
      - status
      - budget_usd
      - spend_usd
      - impressions
      - clicks
      - leads_generated
      - mqls_generated
      - sqls_generated
      - opportunities_sourced
      - pipeline_influenced_usd
      - revenue_influenced_usd
      - roi
      - roas
      - cpl
      - cac
      - conversion_rate_pct
      - brand_awareness_score
      - net_promoter_score
      - share_of_voice_pct
      - event_name
      - event_type
      - event_attendees
      - event_cost_usd
      - event_pipeline_sourced_usd
      - content_title
      - content_type
      - page_views
      - avg_time_on_page_sec
      - downloads
      - engagement_rate_pct
    anonymize:
      - campaign_owner_name           # Replaced with team/squad identifier
    block:
      - ab_test_variant_results       # Embargoed until test concludes
      - unreleased_campaign_brief
      - influencer_contract_value
      - influencer_name_unpublished
      - media_buying_rate
      - media_agency_discount
      - strategic_campaign_roadmap    # Forward-looking unreleased plans

  aggregation_rules:
    min_group_size: 1                 # Campaign data is not person-level; aggregation by campaign is fine
    always_aggregate:
      - budget_utilization            # Show % utilised vs. absolute spend

  sensitivity_levels:
    internal:
      - campaign_id
      - campaign_name
      - channel
      - status
      - leads_generated
      - mqls_generated
    confidential:
      - budget_usd
      - spend_usd
      - roi
      - roas
      - cpl
      - cac
      - pipeline_influenced_usd
      - brand_awareness_score
      - net_promoter_score
      - share_of_voice_pct
    restricted:
      - ab_test_variant_results
      - unreleased_campaign_brief
      - influencer_contract_value
      - media_buying_rate
      - strategic_campaign_roadmap

# ─────────────────────────────────────────────
# PRIVACY RIGHTS
# ─────────────────────────────────────────────
privacy_rights:
  internal_only:
    - name: unreleased_campaign_strategies
      description: >
        Campaign briefs, creative strategies, messaging frameworks, and go-to-market plans
        for campaigns not yet launched.
      reason: >
        Pre-launch strategies are competitively sensitive. Disclosure could allow competitors
        to pre-empt messaging or media buys.
      blocks_topics:
        - "upcoming campaign plans"
        - "Q3 campaign strategy"
        - "what campaign are we launching next"
        - "campaign brief"
        - "messaging strategy"

    - name: ab_test_results_in_flight
      description: >
        Interim and final results of active A/B or multivariate tests that have not yet
        been formally concluded and communicated.
      reason: >
        Premature disclosure of test results can contaminate ongoing tests and bias
        decision-making before statistical significance is achieved.
      blocks_topics:
        - "A/B test results"
        - "which variant is winning"
        - "test performance"
        - "experiment results"

    - name: influencer_contract_terms
      description: >
        Contract values, fee structures, exclusivity clauses, and performance terms
        for influencer and creator partnerships.
      reason: >
        Influencer commercial terms are subject to NDA and disclosure would harm negotiation
        leverage for future partnerships.
      blocks_topics:
        - "influencer fee"
        - "how much do we pay influencers"
        - "influencer contract"
        - "creator deal terms"

    - name: media_buying_rates
      description: >
        Negotiated CPM, CPC, placement rates, and agency discount structures with
        media publishers and ad networks.
      reason: >
        Media rates are commercially sensitive and subject to contractual non-disclosure
        with publishers and the media buying agency.
      blocks_topics:
        - "media rate"
        - "CPM we pay"
        - "agency discount"
        - "publisher deal"
        - "ad placement cost"

  respond_with_when_blocked:
    message: >
      That information is managed internally and cannot be surfaced through this channel.
      Marketing data shown here reflects concluded campaigns and published metrics only,
      in line with RAPID governance policy.
    escalation_path: "Contact the Head of Marketing or the Brand & Comms lead directly."

# ─────────────────────────────────────────────
# STRUCTURED PIPELINE (DB)
# ─────────────────────────────────────────────
structured_pipeline:
  enabled: true

  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - time_period
      - metric
      - filter_channel
      - filter_campaign_type
      - filter_campaign_name
      - aggregation_level           # campaign | channel | quarter | total
      - comparison_period

  schema:
    databases:
      marketing_analytics:
        type: postgresql
        host_env: MARKETING_DB_HOST
        port_env: MARKETING_DB_PORT
        name_env: MARKETING_DB_NAME
        user_env: MARKETING_DB_USER
        pass_env: MARKETING_DB_PASS
        ssl: true
        permitted_tables:
          campaigns:
            description: >
              One row per campaign with budget, spend, dates, and status. Covers all
              channel types: paid, organic, email, events, and ABM. A/B test variants
              are excluded until tests are concluded.
            permitted_columns:
              - campaign_id
              - campaign_name
              - campaign_type
              - channel
              - start_date
              - end_date
              - status
              - budget_usd
              - spend_usd
              - roi
              - roas
            blocked_columns:
              - campaign_owner_name
              - ab_test_variant_results
              - unreleased_campaign_brief
              - media_buying_rate
            row_limit: 200

          leads_summary:
            description: >
              Aggregated lead and MQL volumes by campaign, channel, and period.
              No individual contact-level data — all rows are aggregate counts.
            permitted_columns:
              - period
              - campaign_id
              - channel
              - leads_generated
              - mqls_generated
              - sqls_generated
              - opportunities_sourced
              - pipeline_influenced_usd
              - cpl
              - conversion_rate_pct
            blocked_columns:
              - contact_email
              - contact_name
              - lead_source_detail
            row_limit: 500

          content_performance:
            description: >
              Engagement metrics for published content assets: blog posts, whitepapers,
              case studies, and landing pages. Excludes unpublished drafts.
            permitted_columns:
              - content_id
              - content_title
              - content_type
              - published_date
              - page_views
              - unique_visitors
              - avg_time_on_page_sec
              - downloads
              - engagement_rate_pct
              - leads_attributed
            blocked_columns:
              - draft_content_text
              - author_personal_details
            row_limit: 300

          brand_metrics:
            description: >
              Monthly brand health scores, net promoter scores, and share of voice
              measurements from brand tracking studies.
            permitted_columns:
              - period
              - brand_awareness_score
              - net_promoter_score
              - share_of_voice_pct
              - unaided_recall_pct
              - sentiment_score
              - benchmark_nps
              - benchmark_sov_pct
            blocked_columns: []
            row_limit: 50

          event_summary:
            description: >
              Summary metrics for field events, webinars, and trade shows.
              Includes attendance, cost, and attributed pipeline.
            permitted_columns:
              - event_id
              - event_name
              - event_type
              - event_date
              - event_attendees
              - event_cost_usd
              - mqls_generated
              - pipeline_sourced_usd
              - roi
            blocked_columns:
              - sponsor_contract_value
              - venue_negotiated_rate
            row_limit: 100

          budget_utilization:
            description: >
              Monthly budget allocation vs. actual spend by channel and campaign type.
              Supports budget pacing and variance analysis.
            permitted_columns:
              - period
              - channel
              - budget_allocated_usd
              - spend_usd
              - utilization_pct
              - remaining_budget_usd
              - forecast_eop_spend_usd
            blocked_columns:
              - agency_fee_breakdown
              - media_discount_applied
            row_limit: 100

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

# ─────────────────────────────────────────────
# UNSTRUCTURED PIPELINE (RAG)
# ─────────────────────────────────────────────
unstructured_pipeline:
  enabled: true

  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - brand_guidelines
      - campaign_briefs_concluded
      - competitive_analysis
      - messaging_frameworks
      - buyer_personas
      - content_strategy_published
      - event_playbooks
      - analyst_reports
      - market_research
      - product_launch_materials_published
    rejected_topics:
      - influencer_contracts
      - media_buying_agreements
      - ab_test_in_progress
      - unreleased_campaign_briefs
      - agency_rate_cards
      - customer_pii_lists

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This query comes from the Marketing department. Interpret acronyms and terminology in
      the context of B2B SaaS marketing: MQL means Marketing Qualified Lead, SQL means Sales
      Qualified Lead, ABM means Account-Based Marketing, CAC means Customer Acquisition Cost,
      CPL means Cost Per Lead, ROAS means Return on Ad Spend, NPS means Net Promoter Score,
      SOV means Share of Voice, ICP means Ideal Customer Profile, DG means Demand Generation,
      PMM means Product Marketing Manager. Brand guidelines, briefs, and positioning documents
      may use varied and creative terminology — expand queries accordingly.
    expand_abbreviations: true
    abbreviations:
      MQL: Marketing Qualified Lead
      SQL: Sales Qualified Lead
      ABM: Account-Based Marketing
      CAC: Customer Acquisition Cost
      CPL: Cost Per Lead
      ROAS: Return on Ad Spend
      NPS: Net Promoter Score
      SOV: Share of Voice
      ICP: Ideal Customer Profile
      DG: Demand Generation
      PMM: Product Marketing Manager
      GTM: Go-To-Market
      CTA: Call to Action
      CTR: Click-Through Rate
      CVR: Conversion Rate
      LTV: Lifetime Value

  retriever:
    index_path: departments/marketing/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 8
    use_hyde: true                  # Marketing docs use diverse creative terminology — HyDE improves recall
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

# ─────────────────────────────────────────────
# AGENT
# ─────────────────────────────────────────────
agent:
  persona: >
    You are the RAPID Marketing Intelligence Agent. You provide marketing leaders and campaign
    managers with concise, impact-led answers about campaign performance, lead generation, brand
    health, and budget efficiency. You lead every response with the business impact of marketing
    activity — pipeline sourced or revenue influenced — then provide ROI context against benchmark.
    You do not surface unreleased campaign strategies, in-flight A/B test results, or commercial
    terms with influencers or media partners. When data is unavailable or blocked, you say so
    clearly and direct the user to the appropriate escalation path.
  confidence_threshold: 0.65
  escalates_to: coo
  can_consult:
    - sales
    - customer_success
  output:
    always_include:
      - roi
      - leads_generated
      - cost_per_lead
      - trend
    format: executive_summary
    max_tokens: 800
