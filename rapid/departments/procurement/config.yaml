department:
  id: procurement
  display_name: Procurement
  reports_to: cfo
  active: true

skills:
  generate_reports:
    - id: spend_analysis
      name: Spend Analysis Report
      trigger_phrases:
        - "spend analysis"
        - "how much did we spend"
        - "spend by category"
        - "total spend"
        - "spend vs budget"
        - "procurement spend"
      output_format: table_with_summary

    - id: vendor_performance
      name: Vendor Performance Report
      trigger_phrases:
        - "vendor performance"
        - "supplier scorecard"
        - "how is vendor performing"
        - "vendor rating"
        - "supplier evaluation"
      output_format: scorecard

    - id: purchase_order_status
      name: Purchase Order Status Report
      trigger_phrases:
        - "PO status"
        - "purchase order status"
        - "open POs"
        - "pending orders"
        - "PO pipeline"
      output_format: table_with_summary

    - id: contract_renewal_calendar
      name: Contract Renewal Calendar
      trigger_phrases:
        - "contract renewals"
        - "contracts expiring"
        - "renewal calendar"
        - "what contracts are due"
        - "upcoming renewals"
      output_format: calendar_list

    - id: savings_report
      name: Savings Report
      trigger_phrases:
        - "savings report"
        - "cost savings"
        - "savings vs benchmark"
        - "procurement savings"
        - "how much did we save"
      output_format: metric_cards

  calculations:
    - id: cost_savings_vs_benchmark
      name: Cost Savings vs Benchmark
      trigger_phrases:
        - "savings vs benchmark"
        - "how much below benchmark"
        - "benchmark comparison"
        - "savings percentage"

    - id: vendor_scorecard
      name: Vendor Scorecard
      trigger_phrases:
        - "vendor scorecard"
        - "supplier score"
        - "vendor composite score"
        - "rate the vendor"

    - id: po_cycle_time
      name: PO Cycle Time
      trigger_phrases:
        - "PO cycle time"
        - "how long to process PO"
        - "purchase order turnaround"
        - "procurement lead time"

  integrations:
    - id: export_excel
      enabled: true
    - id: export_pdf
      enabled: true

policy:
  working_rules:
    cost_first: true
    lead_with_spend: "Always open with total spend figure and savings achieved before any other metric."
    show_spend_vs_budget: true
    show_vendor_performance_score: true
    budget_variance_warning_threshold_pct: 10
    flag_expiring_contracts_days: 60
    flag_overdue_pos: true
    include_savings_trend: true
    trend_period_days: 30
    never_expose_negotiated_rates: true
    never_expose_rfp_scores_pre_award: true
    never_expose_negotiation_strategy: true

  reply_style:
    format: structured_report
    structure:
      - total_spend_and_budget_variance
      - savings_achieved
      - vendor_performance_avg
      - po_cycle_time
      - contracts_expiring_soon
      - recommended_actions
    example: >
      SPEND: $4.2M total spend this quarter. Budget variance: -3.1% (under budget).
      SAVINGS: $340K achieved vs benchmark — 8.1% savings rate.
      VENDOR PERFORMANCE: Avg vendor score 82/100. 2 vendors below threshold (70).
      PO CYCLE TIME: Avg 4.3 days. 6 POs overdue >10 days.
      CONTRACTS: 4 contracts expiring within 60 days — renewal action required.

  document_format:
    reports:
      header: true
      include_period: true
      include_prepared_by: "Procurement Agent"
      classification: "CONFIDENTIAL — Procurement Only"
      footer: "Generated by RAPID. Verify with source system."

dept_governance:
  column_rules:
    allow:
      - po_id
      - po_number
      - vendor_name
      - category
      - department
      - po_status
      - po_value
      - po_date
      - delivery_date
      - contract_id
      - contract_name
      - contract_start
      - contract_end
      - contract_value_total
      - vendor_id
      - delivery_score
      - quality_score
      - responsiveness_score
      - composite_score
      - spend_amount
      - budget_amount
      - savings_amount
      - savings_pct
    anonymize:
      - vendor_contact_name
      - vendor_contact_email
      - po_requestor
      - approved_by
    block:
      - vendor_negotiated_rate
      - rfp_individual_scores
      - negotiation_floor_price
      - supplier_financial_details
      - rfp_evaluation_notes_raw
      - internal_procurement_policy_raw
      - vendor_bid_amount_pre_award

  aggregation_rules:
    min_group_size: 3
    always_aggregate:
      - spend_by_vendor
      - savings_by_category
      - vendor_scores_by_tier

  sensitivity_levels:
    internal:
      - po_value
      - spend_amount
      - vendor_name
      - po_status
    confidential:
      - contract_value_total
      - savings_pct
      - composite_score
      - budget_amount
    restricted:
      - vendor_negotiated_rate
      - rfp_individual_scores
      - negotiation_floor_price
      - supplier_financial_details

privacy_rights:
  internal_only:
    - name: vendor_pricing_details
      description: Negotiated rates, unit prices, and discount structures agreed with vendors under NDA.
      reason: Disclosure could undermine renegotiation leverage and breach vendor NDA obligations.
      blocks_topics:
        - "negotiated rate"
        - "what did we pay per unit"
        - "vendor discount"
        - "contract unit price"

    - name: rfp_evaluation_scores
      description: Individual evaluator scores and comments submitted during the RFP process before contract award.
      reason: Pre-award disclosure is legally sensitive and can compromise fair procurement process.
      blocks_topics:
        - "RFP scores"
        - "who scored highest in RFP"
        - "evaluation scores"
        - "RFP evaluation notes"

    - name: negotiation_strategy
      description: Internal negotiation targets, floor prices, and BATNA positions documented for active or upcoming negotiations.
      reason: Exposure of negotiation strategy would eliminate competitive advantage in supplier negotiations.
      blocks_topics:
        - "negotiation strategy"
        - "floor price"
        - "what is our walk-away"
        - "BATNA"
        - "target price"

    - name: internal_procurement_policies
      description: Internal procurement approval thresholds, exception policies, and delegation of authority matrices.
      reason: Exposure could be exploited to circumvent controls or manipulate approval processes.
      blocks_topics:
        - "approval threshold"
        - "procurement policy internal"
        - "delegation of authority"
        - "exception policy"

  respond_with_when_blocked:
    message: >
      This information is subject to Procurement Confidentiality Policy and cannot be
      disclosed through this channel. Please contact the Procurement Director or Legal
      team for access requests relating to vendor pricing, RFP evaluations, or
      negotiation strategy.
    escalation_path: procurement_director

structured_pipeline:
  enabled: true
  extractor:
    model: gpt-4o-mini
    max_tokens: 300
    extract_fields:
      - intent
      - vendor_name
      - category
      - time_range
      - report_type
      - po_status_filter
      - metric_requested

  schema:
    databases:
      procurement_db:
        type: postgresql
        host_env: PROCUREMENT_DB_HOST
        port_env: PROCUREMENT_DB_PORT
        name_env: PROCUREMENT_DB_NAME
        user_env: PROCUREMENT_DB_USER
        pass_env: PROCUREMENT_DB_PASS
        ssl: true
        permitted_tables:
          purchase_orders:
            description: Purchase order records with status, value, vendor, and timeline. Negotiated rates excluded.
            permitted_columns:
              - po_id
              - po_number
              - vendor_name
              - category
              - department
              - po_status
              - po_value
              - po_date
              - delivery_date
              - days_to_process
            blocked_columns:
              - unit_price_negotiated
              - vendor_bid_raw
              - requestor_email
            row_limit: 500

          vendor_performance:
            description: Vendor performance scores by dimension for completed engagements.
            permitted_columns:
              - vendor_id
              - vendor_name
              - category
              - delivery_score
              - quality_score
              - responsiveness_score
              - composite_score
              - evaluation_period
              - total_pos_assessed
            blocked_columns:
              - evaluator_name
              - raw_comments
              - financial_health_raw
            row_limit: 200

          contracts_procurement:
            description: Active and upcoming contracts with renewal dates and total values.
            permitted_columns:
              - contract_id
              - contract_name
              - vendor_name
              - category
              - contract_start
              - contract_end
              - contract_value_total
              - auto_renewal
              - status
            blocked_columns:
              - unit_rate_detail
              - negotiation_notes
              - legal_exceptions
            row_limit: 300

          spend_by_category:
            description: Aggregated spend amounts by category and department per period.
            permitted_columns:
              - category
              - department
              - period
              - spend_amount
              - budget_amount
              - variance_pct
            blocked_columns: []
            row_limit: 200

          rfp_log:
            description: RFP process log with status and timeline. Pre-award scores and evaluator notes excluded.
            permitted_columns:
              - rfp_id
              - rfp_title
              - category
              - status
              - issue_date
              - award_date
              - shortlisted_vendors_count
              - awarded_vendor_name
            blocked_columns:
              - individual_scores
              - evaluator_comments
              - vendor_bid_amounts
              - floor_price_internal
            row_limit: 200

          savings_tracker:
            description: Realized savings versus benchmark prices by category and period.
            permitted_columns:
              - category
              - vendor_name
              - period
              - benchmark_price
              - negotiated_price
              - savings_amount
              - savings_pct
            blocked_columns:
              - negotiation_floor
              - evaluator_id
            row_limit: 200

  sql_writer:
    mode: read_only
    max_joins: 3
    require_limit: true
    default_limit: 100
    forbidden_keywords:
      - DROP
      - TRUNCATE
      - INSERT
      - UPDATE
      - DELETE
      - EXEC
      - EXECUTE

  verifier:
    run_explain: true
    max_execution_ms: 5000
    max_rows_returned: 1000

  governance:
    strip_before_llm: true
    output_format: nl_summary
    max_summary_tokens: 400

unstructured_pipeline:
  enabled: true
  classifier:
    accepted_types:
      - pdf
      - docx
      - xlsx
      - txt
      - csv
    accepted_topics:
      - procurement policy
      - vendor management
      - spend analysis
      - contract management
      - purchase orders
      - RFP process
      - supplier onboarding
      - category management
      - cost savings
      - procurement compliance
    rejected_topics:
      - HR personnel data
      - patient records
      - legal privileged communications
      - raw vendor bids pre-award
      - individual RFP evaluator scores
      - negotiation floor prices

  rewriter:
    model: gpt-4o-mini
    inject_domain_context: true
    domain_context: >
      This is a Procurement and Supply Chain department context. Documents use sourcing
      terminology (RFQ, RFP, RFI, PO, GRN, SOW), contract management terms (SLA, OLA,
      MSA, NDA, auto-renewal), and financial concepts (TCO, benchmark pricing, variance,
      EBITDA impact). Expand procurement acronyms and map to their standard meanings in
      a corporate procurement environment.
    expand_abbreviations: true
    abbreviations:
      PO: Purchase Order
      RFP: Request for Proposal
      RFQ: Request for Quotation
      RFI: Request for Information
      GRN: Goods Receipt Note
      SOW: Statement of Work
      MSA: Master Service Agreement
      NDA: Non-Disclosure Agreement
      TCO: Total Cost of Ownership
      SLA: Service Level Agreement
      OLA: Operational Level Agreement
      BATNA: Best Alternative to a Negotiated Agreement

  retriever:
    index_path: departments/procurement/data/faiss_index
    embedding_model: text-embedding-3-small
    embedding_dim: 1536
    top_k: 5
    use_hyde: false
    use_bm25_hybrid: true
    bm25_weight: 0.3
    semantic_weight: 0.7
    chunk_size: 512
    chunk_overlap: 64
    rerank: true
    rerank_top_n: 4

  summarizer:
    model: gpt-4o-mini
    max_input_chunks: 4
    max_summary_tokens: 500
    strip_chunks_after: true
    include_source: true

agent:
  persona: >
    You are the RAPID Procurement Agent. You assist the Procurement and Finance teams
    by surfacing spend data, vendor performance, PO status, and contract renewal intelligence.
    You lead every response with total spend and savings achieved. You never expose
    negotiated vendor rates, pre-award RFP scores, negotiation strategies, or supplier
    financial details. You flag contracts expiring within 60 days and overdue POs proactively.
  confidence_threshold: 0.65
  escalates_to: procurement_director
  can_consult:
    - finance
    - legal
    - ops
  output:
    always_include:
      - total_spend
      - savings_achieved
      - vendor_performance_avg
      - po_cycle_time
    format: executive_summary
    max_tokens: 800
