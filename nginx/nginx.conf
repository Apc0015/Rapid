worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  # Gzip static assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # ── Frontend static files ──────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ── Backend API proxy ──────────────────────────────────────────────────
    # All requests to /api/* are proxied to the FastAPI container.
    # config.js sets window.RAPID_API_URL = location.origin + "/api"
    # for non-localhost deployments.
    location /api/ {
      proxy_pass         http://rapid:8000/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;

      # WebSocket support (for streaming responses)
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    # Health check endpoint (direct — no auth)
    location /health {
      proxy_pass http://rapid:8000/health;
    }
  }
}
